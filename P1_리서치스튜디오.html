async function ensureExtractor(){if(embState.extractor)return embState.extractor;const lib=await loadTransformers();const device=hasWebGPU()?"webgpu":"wasm";embLoader.set(true,0,"임베딩 모델 다운로드 중… (최초 1회)");try{embState.extractor=await lib.pipeline("feature-extraction",EMB_MODEL,{device,progress_callback:(p)=>{if(p&&p.status==="progress"){const pct=p.total?p.loaded/p.total:0;embLoader.set(true,pct,(p.file||"")+" "+Math.round(pct*100)+"%");}else if(p&&p.status)embLoader.set(true,embLoader.progress,p.status);}});}catch(e){try{embState.extractor=await lib.pipeline("feature-extraction","Xenova/all-MiniLM-L6-v2",{device});}catch(e2){embLoader.set(false,1,"");throw new Error("임베딩 모델 로드 실패: "+(e.message||e));}}finally{embLoader.set(false,1,"");}return embState.extractor;}
async function embedTexts(texts,onProg){const ex=await ensureExtractor();const vecs=[];const B=24;for(let i=0;i<texts.length;i+=B){const batch=texts.slice(i,i+B);const out=await ex(batch,{pooling:"mean",normalize:true});const list=out.tolist?out.tolist():out;for(const v of list)vecs.push(Float32Array.from(v));onProg&&onProg(Math.min(1,(i+B)/texts.length));}return vecs;}
function kmeans(vectors,k,iters=30){const n=vectors.length;if(!n)return{assign:[]};const d=vectors[0].length;k=Math.max(1,Math.min(k,n));const idx=[...Array(n).keys()];for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}let cent=idx.slice(0,k).map(i=>Array.from(vectors[i]));let assign=new Array(n).fill(0);for(let it=0;it<iters;it++){let changed=false;for(let i=0;i<n;i++){let best=0,bd=Infinity;const v=vectors[i];for(let c=0;c<k;c++){let s=0;const cc=cent[c];for(let j=0;j<d;j++){const x=v[j]-cc[j];s+=x*x;}if(s<bd){bd=s;best=c;}}if(assign[i]!==best){assign[i]=best;changed=true;}}const sums=Array.from({length:k},()=>new Float64Array(d));const cnt=new Array(k).fill(0);for(let i=0;i<n;i++){const c=assign[i];cnt[c]++;const v=vectors[i];const su=sums[c];for(let j=0;j<d;j++)su[j]+=v[j];}for(let c=0;c<k;c++){if(!cnt[c]){cent[c]=Array.from(vectors[Math.floor(Math.random()*n)]);continue;}for(let j=0;j<d;j++)cent[c][j]=sums[c][j]/cnt[c];}if(!changed&&it>0)break;}return{assign};}

const PDFJS_VER="4.10.38";let pdfjsLib=null;
async function loadPdfjs(){if(pdfjsLib)return pdfjsLib;const lib=await import("https://cdn.jsdelivr.net/npm/pdfjs-dist@"+PDFJS_VER+"/build/pdf.min.mjs");lib.GlobalWorkerOptions.workerSrc="https://cdn.jsdelivr.net/npm/pdfjs-dist@"+PDFJS_VER+"/build/pdf.worker.min.mjs";pdfjsLib=lib;return lib;}
async function extractPdfText(file,onProg){const lib=await loadPdfjs();const ab=await file.arrayBuffer();const doc=await lib.getDocument({data:ab}).promise;let text="";for(let p=1;p<=doc.numPages;p++){const page=await doc.getPage(p);const c=await page.getTextContent();text+=c.items.map(i=>i.str).join(" ")+"\n";onProg&&onProg(p/doc.numPages);}return text.trim();}
function chunkText(text,size=600,overlap=100){const out=[];const t=(text||"").replace(/\s+/g," ").trim();for(let i=0;i<t.length;i+=(size-overlap)){out.push(t.slice(i,i+size));}return out.filter(c=>c.trim().length>40);}

const tabLabel=(id)=>{const t=(typeof TABS!=="undefined"?TABS:[]).find(x=>x.id===id);return t?t.label:id;};
function MentorFab({tab,settings,openSettings,toast}){
  const[open,setOpen]=useState(false);const[view,setView]=useState("ask");
  const[thread,setThread]=useState([]);const[q,setQ]=useState("");const[busy,setBusy]=useState(false);const[,f]=useState(0);
  const hasNS=!!(window.UXAX&&UXAX.mentorAdd);
  const log=hasNS?UXAX.mentorLoad():[];
  const answer=async(text)=>{
    const qq=(text!==undefined?text:q||"").trim();if(!qq||busy)return;setQ("");
    const faq=(FAQ_BY_TAB[tab]||[]).find(x=>x.q===qq||qq.indexOf(x.q.replace(/[?]/g,""))>=0);
    if(faq){setThread(t=>[...t,{q:qq,a:faq.a}]);if(hasNS)UXAX.mentorAdd(tab,qq,faq.a);return;}
    if(!backendReady(settings)){toast&&toast("error","AI 엔진을 먼저 설정하세요(⚙)");openSettings&&openSettings();return;}
    setBusy(true);setThread(t=>[...t,{q:qq,a:"…"}]);
    try{const out=await runLLM(settings,{system:"당신은 UX 프로세스를 가르치는 친절한 시니어 멘토입니다. UX·개발을 잘 모르는 초급 디자이너에게 전문용어는 풀어서, 쉬운 한국어로 3~5문장으로 답합니다.",messages:[{role:"user",content:"["+tabLabel(tab)+"] "+qq}],maxTokens:500,meta:{who:"학습 멘토"}});const a=out||"(답이 비었어요)";setThread(t=>{const c=[...t];c[c.length-1]={q:qq,a};return c;});if(hasNS)UXAX.mentorAdd(tab,qq,a);}
    catch(e){setThread(t=>{const c=[...t];c[c.length-1]={q:qq,a:"실패: "+(e.message||e)};return c;});}
    finally{setBusy(false);}
  };
  return <React.Fragment>
    <button onClick={()=>setOpen(o=>!o)} className="no-print fixed bottom-[4.75rem] right-5 z-[60] flex items-center gap-1.5 rounded-full bg-white px-4 py-2.5 text-[13px] font-bold text-brand-hover shadow-pop ring-1 ring-brand/30 hover:bg-brand-light" title="학습 멘토 — 모르는 건 바로 물어보세요">🎓 학습 멘토{log.length?(" "+log.length):""}</button>
    {open&&<div className="no-print fixed bottom-5 right-5 z-[70] flex max-h-[78vh] w-[370px] max-w-[92vw] flex-col rounded-2xl border border-hair bg-white shadow-pop fade-in">
      <div className="flex items-center justify-between border-b border-hair px-4 py-3">
        <div className="text-[14px] font-bold text-ink">🎓 학습 멘토</div>
        <div className="flex items-center gap-1">
          <button onClick={()=>setView(view==="ask"?"history":"ask")} className="rounded-full px-2 py-1 text-[12px] font-semibold text-slate-500 hover:bg-slate-100">{view==="ask"?("📚 내 질문"+(log.length?(" "+log.length):"")):"← 질문하기"}</button>
          <button onClick={()=>setOpen(false)} className="rounded-full px-2 py-1 text-slate-400 hover:bg-slate-100">✕</button>
        </div>
      </div>
      {view==="ask"?<React.Fragment>
        <div className="flex-1 space-y-3 overflow-y-auto px-4 py-3">
          <div className="text-[12px] text-slate-400">지금 화면(<b className="text-slate-500">{tabLabel(tab)}</b>)에서 많이 묻는 것 — 눌러보세요:</div>
          <div className="flex flex-wrap gap-1.5">{(FAQ_BY_TAB[tab]||[]).map((x,i)=><button key={i} onClick={()=>answer(x.q)} className="rounded-full bg-brand-faint px-2.5 py-1 text-[12px] font-semibold text-brand-hover hover:bg-brand-light">{x.q}</button>)}</div>
          {thread.map((m,i)=><div key={i} className="space-y-1">
            <div className="ml-auto w-fit max-w-[85%] rounded-2xl bg-brand px-3 py-2 text-[13px] text-white">{m.q}</div>
            <div className="w-fit max-w-[92%] rounded-2xl bg-slate-100 px-3 py-2 text-[13px] leading-relaxed text-slate-700 whitespace-pre-wrap">{m.a==="…"?<Spinner size={14}/>:m.a}</div>
          </div>)}
        </div>
        <div className="border-t border-hair p-3"><div className="flex gap-1.5"><input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")answer();}} placeholder="궁금한 걸 입력…" className={cx(inputVisual,"min-w-0 flex-1 py-1.5 text-[13px]")}/><Btn size="sm" onClick={()=>answer()} disabled={busy}>{busy?<Spinner size={12}/>:"보내기"}</Btn></div><div className="mt-1.5 text-[11px] text-slate-400">물어본 건 ‘내 질문’에 모여서 나중에 복습할 수 있어요.</div></div>
      </React.Fragment>:<div className="flex-1 space-y-2 overflow-y-auto px-4 py-3">
        {!log.length?<p className="rounded-xl bg-slate-50 p-3 text-[13px] text-slate-500">아직 질문 기록이 없어요. 모르는 걸 물어보면 여기 모여서 나중에 복습할 수 있어요.</p>:log.map(m=><div key={m.id} className="rounded-xl border border-hair p-2.5"><div className="text-[11px] text-slate-400">{tabLabel(m.page)} · {m.at}</div><div className="mt-0.5 text-[13px] font-semibold text-ink">Q. {m.q}</div><div className="mt-0.5 whitespace-pre-wrap text-[12.5px] leading-relaxed text-slate-600">{m.a}</div></div>)}
        {!!log.length&&<button onClick={()=>{if(confirm("질문 기록을 모두 지울까요?")){UXAX.mentorClear();f(n=>n+1);}}} className="text-[12px] text-slate-400 hover:text-rose-500">기록 비우기</button>}
      </div>}
    </div>}
  </React.Fragment>;
}

const BACKENDS=[{id:"webllm",label:"🌐 브라우저 내장 AI",desc:"무료·설치/키 없음·WebGPU"},{id:"ollama",label:"🖥️ 로컬 Ollama",desc:"무료·내 PC·대량 처리 적합"},{id:"manual",label:"✍️ 수동/챗GPT",desc:"무료·복붙(대량엔 번거로움)"},{id:"api",label:"☁️ Anthropic API",desc:"유료·대량 처리 빠름"}];
function SettingsModal({settings,onSave,onClose}){const[draft,setDraft]=useState({backend:"manual",ollamaUrl:"http://127.0.0.1:11434",ollamaModel:"",webllmModel:WEBLLM_PREFERRED[0],model:MODELS[0].id,apiKey:"",...settings});const[testing,setTesting]=useState(false);const[tr,setTr]=useState(null);const[om,setOm]=useState([]);const[lo,setLo]=useState(false);const[wm,setWm]=useState([]);const[lw,setLw]=useState(false);const refreshO=useCallback(async()=>{setLo(true);setTr(null);try{const l=await ollamaListModels(draft.ollamaUrl);setOm(l);if(l.length&&!l.includes(draft.ollamaModel))setDraft(d=>({...d,ollamaModel:l[0]}));if(!l.length)setTr({ok:false,msg:"모델 없음 → ollama pull exaone3.5:7.8b"});}catch(e){setTr({ok:false,msg:"연결 실패 — start-ollama.bat 실행"});setOm([]);}finally{setLo(false);}},[draft.ollamaUrl,draft.ollamaModel]);const refreshW=useCallback(async()=>{setLw(true);setTr(null);try{const l=await getWebLLMModels();setWm(l);if(l.length&&!l.includes(draft.webllmModel))setDraft(d=>({...d,webllmModel:WEBLLM_PREFERRED.find(x=>l.includes(x))||l[0]}));}catch(e){setTr({ok:false,msg:"목록 로드 실패"});}finally{setLw(false);}},[draft.webllmModel]);useEffect(()=>{if(draft.backend==="ollama")refreshO();if(draft.backend==="webllm")refreshW();/*eslint-disable-next-line*/},[draft.backend]);const test=async()=>{setTesting(true);setTr(null);try{if(draft.backend==="ollama"){const o=await callOllama({url:draft.ollamaUrl,model:draft.ollamaModel,messages:[{role:"user",content:"한국어로 OK만"}],maxTokens:10});setTr({ok:true,msg:"응답: "+(o||"").slice(0,20)});}else if(draft.backend==="webllm")setTr(hasWebGPU()?{ok:true,msg:"WebGPU 지원 ✓"}:{ok:false,msg:"WebGPU 미지원"});else if(draft.backend==="api"){await callClaude({apiKey:draft.apiKey,model:draft.model,maxTokens:16,messages:[{role:"user",content:"ping"}]});setTr({ok:true,msg:"연결 성공!"});}else setTr({ok:true,msg:"수동 모드 바로 사용 가능"});}catch(e){setTr({ok:false,msg:e.message});}finally{setTesting(false);}};return <div className="fixed inset-0 z-[80] flex items-center justify-center bg-ink/40 p-4" onClick={onClose}><Card className="max-h-[90vh] w-full max-w-lg overflow-y-auto p-6 shadow-pop fade-in"><div onClick={e=>e.stopPropagation()}><div className="mb-5 flex items-center justify-between"><h3 className="text-lg font-bold text-ink">설정 · AI 엔진</h3><button className="text-slate-400 hover:text-ink" onClick={onClose}>✕</button></div><div className="space-y-5"><div><div className="mb-2 text-sm font-semibold text-ink">AI 엔진 <span className="font-normal text-slate-400">(무료 우선 · 모든 탭 공유)</span></div><div className="grid grid-cols-2 gap-2">{BACKENDS.map(b=><button key={b.id} onClick={()=>{setDraft(d=>({...d,backend:b.id}));setTr(null);}} className={cx("rounded-xl border p-3 text-left transition",draft.backend===b.id?"border-brand bg-brand-light":"border-hair hover:border-slate-300")}><div className="text-[13px] font-bold text-ink">{b.label}</div></button>)}</div><p className="mt-2 text-[13px] text-slate-400">{(BACKENDS.find(b=>b.id===draft.backend)||{}).desc}</p></div>{draft.backend==="webllm"&&<div className="space-y-3 rounded-xl bg-slate-50 p-4"><div className="text-[13px] font-semibold">{hasWebGPU()?<span className="text-emerald-600">WebGPU 지원됨 ✓</span>:<span className="text-rose-600">WebGPU 미지원 — Chrome/Edge/웨일 최신 버전</span>}</div><Field label="모델"><div className="flex gap-2"><select value={draft.webllmModel} onChange={e=>setDraft({...draft,webllmModel:e.target.value})} className={cx(inputVisual,"min-w-0 flex-1")}>{(wm.length?wm:[draft.webllmModel]).map(m=><option key={m} value={m}>{m}</option>)}</select><Btn variant="outline" size="sm" onClick={refreshW} disabled={lw}>{lw?<Spinner size={14}/>:"↻"}</Btn></div></Field></div>}{draft.backend==="ollama"&&<div className="space-y-3 rounded-xl bg-slate-50 p-4"><Field label="Ollama 주소"><input className={inputCls} value={draft.ollamaUrl} onChange={e=>setDraft({...draft,ollamaUrl:e.target.value.trim()})}/></Field><Field label="모델"><div className="flex gap-2"><select value={draft.ollamaModel} onChange={e=>setDraft({...draft,ollamaModel:e.target.value})} className={cx(inputVisual,"min-w-0 flex-1")}>{!om.length&&<option value="">— 없음 —</option>}{om.map(m=><option key={m} value={m}>{m}</option>)}</select><Btn variant="outline" size="sm" onClick={refreshO} disabled={lo}>{lo?<Spinner size={14}/>:"↻"}</Btn></div></Field><p className="text-[13px] text-slate-500"><b>start-ollama.bat</b> 실행 후 모델: <code className="rounded bg-white px-1">ollama pull exaone3.5:7.8b</code></p></div>}{draft.backend==="manual"&&<div className="rounded-xl bg-slate-50 p-4 text-[13px] text-slate-600">설치·키 없이 무료. 실행 때 <b>프롬프트 창</b>이 뜨면 복사 → 챗봇에 붙여넣고 답을 다시 붙여넣으세요. (전사·임베딩은 브라우저에서 자동) 대량 작업은 Ollama·API 권장.</div>}{draft.backend==="api"&&<div className="space-y-3 rounded-xl bg-slate-50 p-4"><Field label="Anthropic API 키"><input type="password" className={inputCls} value={draft.apiKey} placeholder="sk-ant-..." onChange={e=>setDraft({...draft,apiKey:e.target.value.trim()})}/></Field><Field label="모델"><select value={draft.model} onChange={e=>setDraft({...draft,model:e.target.value})} className={inputCls}>{MODELS.map(m=><option key={m.id} value={m.id}>{m.label}</option>)}</select></Field><a href="https://console.anthropic.com/settings/keys" target="_blank" className="text-[13px] text-brand-hover underline">키 발급 ↗</a></div>}<div className="flex items-center gap-3"><Btn variant="outline" size="sm" onClick={test} disabled={testing}>{testing?<Spinner size={14}/>:"🔌"} 연결 테스트</Btn>{tr&&<span className={cx("text-sm",tr.ok?"text-brand-hover":"text-rose-600")}>{tr.msg}</span>}</div></div><div className="mt-6 flex justify-end gap-2"><Btn variant="ghost" onClick={onClose}>취소</Btn><Btn onClick={()=>onSave(draft)}>저장</Btn></div></div></Card></div>;}

function InterviewPanel({settings,openSettings,toast}){
  const K="uxax_p1a1_v1";const sv=load(K,{});
  const[ctx,setCtx]=useState(sv.ctx||"");const[files,setFiles]=useState([]);const[segments,setSegments]=useState(sv.segments||[]);const[transMeta,setTransMeta]=useState(sv.transMeta||null);const[curUrl,setCurUrl]=useState(null);const[summary,setSummary]=useState(sv.summary||null);const[rawSummary,setRawSummary]=useState("");
  const[whisperModel,setWhisperModel]=useState(sv.whisperModel||((window.UXAX&&UXAX.WHISPER_BEST)||WHISPER_MODELS[1].id));const[language,setLanguage]=useState(sv.language||"korean");
  const[sttPhase,setSttPhase]=useState("");const[sttBusy,setSttBusy]=useState(false);const[sumBusy,setSumBusy]=useState(false);const[sttProg,setSttProg]=useState(0);const[dragOver,setDragOver]=useState(false);
  const[pasteMode,setPasteMode]=useState(false);const[pasteText,setPasteText]=useState("");
  const audioRef=useRef(null);
  const projectBrief=loadBrief();
  useEffect(()=>{save(K,{ctx,segments,summary,whisperModel,language,transMeta})},[ctx,segments,summary,whisperModel,language,transMeta]);
  useEffect(()=>{if(!sv.ctx&&projectBrief){const c=briefToContext(projectBrief);if(c){setCtx(c);toast&&toast("info","프로젝트 정의 ‘"+briefName(projectBrief)+"’의 맥락을 자동으로 채웠어요");}}},[]);
  const addFiles=(list)=>{const a2=[...list].filter(f=>f&&(/audio|video/.test(f.type)||/\.(mp3|wav|m4a|ogg|webm|mp4|aac|flac)$/i.test(f.name)));if(!a2.length){toast("error","오디오/영상 파일을 올려주세요");return;}setFiles(fs=>[...fs,...a2.map(f=>({id:uid("af"),name:f.name,file:f,url:URL.createObjectURL(f)}))]);toast("ok",a2.length+"개 파일 추가됨");};
  const delFile=(id)=>setFiles(fs=>{const x=fs.find(f=>f.id===id);if(x&&x.url)URL.revokeObjectURL(x.url);return fs.filter(f=>f.id!==id);});
  const onTranscribe=async(f)=>{
    setSummary(null);setRawSummary("");setSttBusy(true);setSttPhase("준비 중…");setSttProg(0);
    const t0=performance.now();
    let dur=0; try{dur=await audioDuration(f.url);}catch(e){}
    const est=Math.max(5,(dur||30)*(hasWebGPU()?0.9:2.6)); // 추정 총 소요(초) — 정확 ETA는 라이브러리 미제공
    const timer=setInterval(()=>{const el=(performance.now()-t0)/1000;setSttProg(Math.min(0.96,el/est));},250);
    try{const res=await transcribeFile(f.file,whisperModel,language,(p)=>setSttPhase(p));setSegments(res.chunks);setTransMeta({name:f.name,model:(WHISPER_MODELS.find(m=>m.id===whisperModel)||{}).label||whisperModel,ms:Math.round(performance.now()-t0)});setCurUrl(f.url);setSttProg(1);toast("ok","텍스트화 완료 · "+res.chunks.length+"구간");}
    catch(e){toast("error","텍스트화 실패: "+(e.message||e));setSttPhase("");}

  const onFile=(file)=>{if(!file)return;const r=new FileReader();r.onload=()=>{try{const rows=parseCSV(r.result);let col=0,best=-1;for(let c=0;c<(rows[0]||[]).length;c++){let t=0,n=0;for(let i=1;i<rows.length;i++){t+=(rows[i][c]||"").length;n++;}if(n&&t/n>best){best=t/n;col=c;}}const list=rows.slice(1).map(rw=>(rw[col]||"").trim()).filter(Boolean);setReviewsText(list.join("\n"));setClusters(null);setPriorities(null);toast("ok",list.length+"건 리뷰 불러옴");}catch(e){toast("error","파싱 실패");}};r.readAsText(file);};

function DeskPanel({settings,openSettings,toast}){

  const addText=()=>{const name=prompt("출처 이름(예: 2024 시장보고서)");if(name==null)return;setSources(s=>[...s,{id:uid("src"),name:name||("출처 "+(s.length+1)),text:""}]);};
  const setSrc=(id,k,v)=>setSources(s=>s.map(x=>x.id===id?{...x,[k]:v}:x));
  const delSrc=(id)=>setSources(s=>s.filter(x=>x.id!==id));
  const run=async()=>{const valid=sources.filter(s=>(s.text||"").trim().length>40);if(!valid.length){toast("error","텍스트가 있는 자료가 없어요");return;}if(!question.trim()){toast("error","리서치 질문을 입력하세요");return;}if(!backendReady(settings)){toast("error","AI 엔진을 설정하세요");openSettings();return;}setBusy(true);setResult(null);try{setPhase("문서 청킹·임베딩 중…");const chunks=[];valid.forEach((s,si)=>chunkText(s.text).forEach(c=>chunks.push({si,name:s.name,text:c})));if(!chunks.length)throw new Error("청크 생성 실패");const vecs=await embedTexts(chunks.map(c=>c.text),()=>{});const qvs=await embedTexts([question]);const qv=qvs[0];setPhase("관련 구절 검색(RAG) 중…");const scored=chunks.map((c,i)=>({...c,score:dot(qv,vecs[i])})).sort((a,b)=>b.score-a.score).slice(0,Math.max(4,Math.min(topK,chunks.length)));const ctxStr=scored.map(c=>`[S${c.si+1}] (${c.name})\n${c.text}`).join("\n\n");setPhase("브리프 합성 중…");const out=await runLLM(settings,{system:SYS_RESEARCH,messages:[{role:"user",content:buildDeskPrompt(question,ctxStr)}],maxTokens:2600,stream:false,meta:{who:"데스크 리서치 합성"}});const p=parseJsonLoose(out);setResult(p&&typeof p==="object"?{...p,sources:valid.map((s,i)=>({tag:"S"+(i+1),name:s.name}))}:{raw:out});toast("ok","리서치 브리프 완료");}catch(e){toast("error","합성 실패: "+(e.message||e));}finally{setBusy(false);setPhase("");}};
  const briefMd=()=>{if(!result)return "";let md="# 리서치 브리프\n\n**질문:** "+question+"\n\n";if(result.findings){md+="## 핵심 발견\n";result.findings.forEach(f=>md+=`- ${S(f.claim)} ${S(f.source)}\n`);md+="\n";}if(result.comparison)md+="## 자료 간 비교\n"+S(result.comparison)+"\n\n";if(result.gaps){md+="## 데이터 공백\n";arr(result.gaps).forEach(g=>md+=`- ${S(g)}\n`);}return md;};
  const saveSlot=()=>{if(window.UXAX&&UXAX.setSlot&&result&&result.findings)UXAX.setSlot("P1.desk",{data:{question,result},md:briefMd(),meta:{model:backendLabel(settings),items:(result.findings||[]).length}});};
  useEffect(()=>{if(result&&result.findings)saveSlot();},[result]);// eslint-disable-line
  return <div className="space-y-6">
    <Guide defaultOpen={!sources.length}
      what="보고서·논문·웹자료 등 2차 자료(PDF/텍스트)를 모아, 특정 리서치 질문에 대해 ‘출처가 연결된 리서치 브리프’를 만들어 주는 도구입니다. 자료를 잘게 나눠 임베딩한 뒤 질문과 가장 관련된 구절만 골라(RAG, 검색증강생성) 요약·비교합니다."
      where="P1 리서치 단계의 ‘데스크 리서치(2차 조사)’. 사용자를 직접 만나기 전, 시장·선행연구·경쟁 보고서로 맥락을 잡을 때 씁니다. 결과는 인터뷰 가이드·페르소나·PRD의 배경 근거가 됩니다."
      why="방대한 문헌을 다 읽는 데 드는 시간을 줄이면서, 모든 주장에 [출처]를 붙여 신뢰할 수 있게 합니다. 자료에 ‘없는 내용’은 지어내지 않고 데이터 공백으로 표시해 환각을 방지합니다."
      inputs={[
        {field:"자료(출처)", desc:"PDF를 올리면 본문 텍스트를 자동 추출(스캔 이미지 PDF는 불가). 또는 ‘+ 텍스트 출처’로 본문을 직접 붙여넣기. 출처마다 이름을 달아두면 인용 추적이 쉬움.", ex:"‘2024 중고거래 시장 보고서’, 경쟁사 리뷰 분석 PDF …"},
        {field:"리서치 질문", desc:"이 자료들로 무엇을 답하고 싶은지 한 문장. 구체적일수록 관련 구절을 정확히 찾습니다.", ex:"비대면 중고거래에서 사용자가 느끼는 신뢰 장벽과 해소 방안은?"},
        {field:"참고 구절 수(top-K)", desc:"질문과 가장 가까운 구절을 몇 개나 근거로 쓸지. 많으면 폭넓지만 산만, 적으면 좁고 정확.", ex:"8~12"},
      ]}
      steps={[
        {t:"자료 추가",d:"PDF를 올리면 브라우저가 텍스트를 추출합니다(스캔 이미지 PDF는 불가). 또는 ‘+ 텍스트 출처’로 본문을 직접 붙여넣습니다."},
        {t:"리서치 질문 입력",d:"이 자료들로 무엇을 알고 싶은지 한 문장으로."},
        {t:"실행",d:"자료를 잘게 나눠 임베딩하고, 질문과 가장 관련된 구절만 골라(RAG) 출처가 연결된 브리프를 만듭니다."},
        {t:"검토·내보내기",d:"각 발견의 [S#] 출처를 확인하고, 자료 간 비교·데이터 공백을 봅니다. MD로 내보냅니다."},
      ]}
      tips={[
        "자료 안에 있는 내용만 근거로 합성합니다(환각 방지). 발견마다 [S#] 출처를 꼭 확인하세요.",
        "웹 링크(URL)는 file://에서 막히므로, 페이지 본문을 복사해 텍스트 출처로 붙여넣으세요.",
        "‘데이터 공백’은 추가로 직접 조사하거나 인터뷰로 확인할 항목입니다.",
      ]}/>
    <Card className="p-6">
      <div className="mb-3 flex items-center gap-1"><StepHead n={1} title="자료 입력" sub="PDF 자동 추출 또는 텍스트 출처" done={sources.length>0}/><HelpCue title="데스크 리서치 합성" faqs={DESK_FAQ} settings={settings} openSettings={openSettings} toast={toast}/></div>
      <div className="mb-3 flex flex-wrap items-center gap-2"><Btn size="sm" variant="outline" onClick={()=>{setSources(s=>[...s,{id:uid("src"),name:"2024 중고거래 시장 보고서(예제)",text:DEMO_DESK_TEXT}]);setQuestion(q=>q||DEMO_DESK_Q);setResult(null);toast("ok","예제 자료를 추가했어요(기존 자료에 누적) — 2단계 ‘브리프 합성’을 눌러보세요");}}>▶ 예제로 해보기</Btn><span className="text-[12px] text-slate-400">PDF 없이 예제 자료로 바로 체험(누적)</span></div>
      <div className="flex flex-wrap gap-2"><label className="cursor-pointer rounded-[10px] bg-brand-light px-4 py-2.5 text-sm font-semibold text-brand-hover hover:bg-[#e3e6f7]">📄 PDF 추가<input type="file" accept="application/pdf,.pdf" multiple className="hidden" onChange={e=>addPdf([...e.target.files])}/></label><Btn variant="outline" onClick={addText}>+ 텍스트 출처</Btn></div>
      <p className="mt-2 text-[12px] text-slate-400">여러 PDF를 한 번에 올려도 되고, 예제·자료는 누적 추가됩니다. <b className="text-slate-500">S1·S2…</b>는 출처 번호 — 결과의 각 발견이 어느 자료에서 나왔는지 표시돼요.</p>
      {busy&&phase&&<div className="mt-3 flex items-center gap-2 text-[13px] text-brand-hover"><Spinner size={14}/>{phase}</div>}
      <div className="mt-4 space-y-2">{sources.map((s,i)=><div key={s.id} className="rounded-xl border border-hair p-3"><div className="flex items-center justify-between gap-2"><div className="flex items-center gap-2 text-[14px] font-semibold text-ink"><Chip className="bg-brand-light text-brand-hover ring-brand/10">S{i+1}</Chip>{s.name} <span className="text-[12px] font-normal text-slate-400">{(s.text||"").length}자</span></div><button className="text-slate-300 hover:text-rose-500" onClick={()=>delSrc(s.id)}>✕</button></div><textarea ref={el=>{if(el){el.style.height="auto";el.style.height=Math.max(56,el.scrollHeight)+"px";}}} className={cx(inputCls,"mt-2 resize-y text-[13px]")} rows={s.text?2:4} value={s.text} onChange={e=>setSrc(s.id,"text",e.target.value)} placeholder="여기에 자료 본문(또는 PDF 추출 텍스트)이 들어갑니다"/></div>)}{!sources.length&&<p className="rounded-xl bg-slate-50 p-3 text-[13px] text-slate-400">아직 자료가 없어요. PDF를 올리거나 텍스트 출처를 추가하세요.</p>}</div>
    </Card>
    {sources.length>0&&<Card className="p-6">
      <StepHead n={2} title="질문 & 합성 실행" sub="RAG로 관련 구절만 골라 출처 연결 브리프 생성" done={!!result}/>
      <Field label="리서치 질문"><input className={inputCls} value={question} onChange={e=>setQuestion(e.target.value)} placeholder="예: 비대면 거래의 신뢰 장벽과 해소 방안은?"/></Field>
      <div className="mt-3 flex flex-wrap items-end gap-4"><Field label="근거로 쓸 구절 수 (top-K)" hint="질문과 가장 가까운 구절 N개만 근거로 · 보통 8~12"><input type="number" min="4" max="20" className={cx(inputVisual,"w-28")} value={topK} onChange={e=>setTopK(Math.max(4,Math.min(20,+e.target.value||10)))}/></Field><Btn size="lg" onClick={run} disabled={busy}>{busy?<Spinner size={16}/>:"✨"} 브리프 합성</Btn><span className="text-[13px] text-slate-400">{hasWebGPU()?"⚡ WebGPU":"🐢 WASM"} · {backendLabel(settings)}{(()=>{try{const m=window.UXAX&&UXAX.pickModel&&UXAX.pickModel("ko_generate",settings);return m&&m.note?(" · "+m.note):"";}catch(e){return "";}})()}</span></div>
      {busy&&phase&&<div className="mt-3 flex items-center gap-2 text-[14px] font-semibold text-brand-hover"><Spinner size={14}/>{phase}</div>}
    </Card>}
    {result&&result.findings&&<div className="flex flex-wrap items-center gap-2 rounded-2xl border border-brand/20 bg-brand-faint p-4 fade-in">
      <span className="text-[14px] font-bold text-ink">✅ 브리프 끝! 이 결과로 다음 단계 →</span>
      <Btn size="sm" onClick={()=>{wsAdd("데스크 리서치 브리프",briefMd());saveSlot();toast("ok","보관함·프로젝트에 저장됨 — P2에서 📥 가져오기로 이어가세요");setTimeout(()=>{location.href="./P2_정의스튜디오.html#hmw";},1000);}}>📤 저장하고 P2 정의(HMW)로 →</Btn>
      <HelpCue title="브리프 다음 단계는?" faqs={[{q:"데스크 리서치 다음은요?",a:"여기서 잡은 배경·가설이 P2 정의의 HMW(How Might We)나 PRD(요구사항)의 근거가 돼요."}]} settings={settings} openSettings={openSettings} toast={toast}/>
    </div>}
    {result&&<Card className="p-6 fade-in">
      <div className="mb-4 flex flex-wrap items-center justify-between gap-2"><StepHead n={3} title="리서치 브리프" sub="출처 연결 발견 · 비교 · 공백" done={true}/>{result.findings&&<div className="flex flex-wrap gap-2"><Btn size="sm" variant={confirmed?"primary":"outline"} onClick={()=>{const nv=!confirmed;saveSlot();if(window.UXAX&&UXAX.confirmSlot)UXAX.confirmSlot("P1.desk",nv);setConfirmed(nv);toast("ok",nv?"검수 완료로 표시했어요 — 다음 단계에서 ‘사람 확인됨’으로 보여요":"검수 표시를 해제했어요");}}>{confirmed?"✓ 검수 완료":"☐ 내가 검수함"}</Btn><WsSave title="데스크 리서치 브리프" getText={briefMd} toast={toast}/><Btn size="sm" variant="outline" onClick={()=>download("research_brief.md",briefMd())}>↧ MD</Btn></div>}</div>
      {result.findings?<div className="space-y-5">
        <div><div className="mb-2 text-[12px] font-bold uppercase tracking-wide text-slate-400">핵심 발견 (출처 연결)</div><div className="space-y-2">{result.findings.map((f,i)=><Card key={i} className="p-3"><div className="text-[15px] text-ink">{S(f.claim)}</div><div className="mt-1 text-[12px] font-semibold text-brand-hover">↳ {S(f.source)}</div></Card>)}</div></div>
        {result.comparison&&<div><div className="mb-2 text-[12px] font-bold uppercase tracking-wide text-slate-400">자료 간 비교</div><p className="text-[15px] leading-relaxed text-slate-600">{S(result.comparison)}</p></div>}
        {!!(result.gaps||[]).length&&<div><div className="mb-2 text-[12px] font-bold uppercase tracking-wide text-slate-400">데이터 공백</div><ul className="ml-5 list-disc space-y-1 text-[15px] text-slate-600">{result.gaps.map((g,i)=><li key={i}>{S(g)}</li>)}</ul></div>}
        {result.sources&&<div className="text-[12px] text-slate-400">출처: {result.sources.map(s=>`[${s.tag}] ${s.name}`).join(" · ")}</div>}
      </div>:<pre className="whitespace-pre-wrap rounded-xl bg-slate-50 p-3 text-[13px] text-slate-600">{result.raw}</pre>}
    </Card>}
  </div>;
}

/* ============================================================

function GuidePanel({settings,openSettings,toast}){
  const K="uxax_p1a5_v1";const sv=load(K,{});
  const[goal,setGoal]=useState(sv.goal||"");const[participant,setParticipant]=useState(sv.participant||"");const[hyp,setHyp]=useState(sv.hyp||"");const[dur,setDur]=useState(sv.dur||60);const[guide,setGuide]=useState(sv.guide||null);const[busy,setBusy]=useState(false);const[confirmed,setConfirmed]=useState(()=>{try{var s=window.UXAX&&UXAX.getSlot&&UXAX.getSlot("P1.guide");return !!(s&&s.meta&&s.meta.human_confirmed);}catch(e){return false;}});
  useEffect(()=>{save(K,{goal,participant,hyp,dur,guide})},[goal,participant,hyp,dur,guide]);
  const run=async()=>{if(!goal.trim()){toast("error","리서치 목표를 입력하세요");return;}if(!backendReady(settings)){toast("error","AI 엔진을 설정하세요");openSettings();return;}setBusy(true);setGuide(null);try{const out=await runLLM(settings,{system:SYS_RESEARCH,messages:[{role:"user",content:buildGuidePrompt(goal,participant,hyp,dur)}],maxTokens:2200,stream:false,meta:{who:"인터뷰 가이드"}});const p=parseJsonLoose(out);setGuide(p&&p.sections?p:{raw:out});toast("ok","가이드 생성 완료");}catch(e){toast("error","생성 실패: "+(e.message||e));}finally{setBusy(false);}};
  const guideMd=()=>{if(!guide||!guide.sections)return guide?.raw||"";let md="# 인터뷰 가이드\n";(guide.sections||[]).forEach(s=>{md+=`\n## ${S(s.name)}\n`;arr(s.questions).forEach((q,i)=>{const pr=arr(q.probes).map(S).filter(Boolean);md+=`${i+1}. ${S(q.q)}${pr.length?` (프로브: ${pr.join(" / ")})`:""}\n`;});});if(guide.time_plan)md+="\n## 시간 배분\n"+S(guide.time_plan)+"\n";return md;};
  const saveSlot=()=>{if(window.UXAX&&UXAX.setSlot&&guide&&guide.sections)UXAX.setSlot("P1.guide",{data:{goal,participant,hyp,dur,guide},md:guideMd(),meta:{model:backendLabel(settings)}});};
  useEffect(()=>{if(guide&&guide.sections)saveSlot();},[guide]);// eslint-disable-line
  return <div className="space-y-6">
    <Guide defaultOpen={!guide}
      what="리서치 목표·대상·가설을 넣으면 1:1 사용자 인터뷰 질문지(도입→핵심→마무리 구조, 프로브·시간배분 포함)를 초안으로 만들어 주는 도구입니다. 유도/이중 질문을 자동으로 점검합니다."
      where="P1 리서치 단계에서 인터뷰를 ‘하기 전’ 준비물. 이 가이드로 인터뷰를 진행하고, 그 녹음을 ①(전사·요약) 탭에서 정리하는 흐름입니다. 만든 가이드는 퍼소나 스튜디오에서도 불러와 AI 사용자에게 자동 인터뷰할 수 있습니다."
      why="좋은 질문이 좋은 리서치를 만듭니다. 유도질문(원하는 답을 끌어내는 질문)을 피하고 개방형으로 구성해야 진짜 인사이트가 나오는데, AI가 그 기준을 반영한 초안을 빠르게 줍니다."
      inputs={[
        {field:"리서치 목표 (필수)", desc:"이 인터뷰로 무엇을 알아내려는지. 질문지 전체의 방향을 결정합니다.", ex:"첫 거래 전환을 막는 불안 요인과 그 맥락 파악"},
        {field:"인터뷰 대상", desc:"누구를 인터뷰하는지. 대상의 상황·수준에 맞춰 질문 난이도·표현이 달라집니다.", ex:"가입 후 30일간 거래가 없는 신규 사용자"},
        {field:"가설 (선택)", desc:"검증하고 싶은 가정. 넣으면 그 가설을 확인·반박할 질문이 포함됩니다(유도하지 않게 균형).", ex:"사기 뉴스 노출이 첫 거래를 망설이게 만들 것이다"},
      ]}
      steps={[
        {t:"목표·대상 입력",d:"이 인터뷰로 무엇을 알고 싶은지, 누구를 인터뷰하는지 적습니다."},
        {t:"생성 실행",d:"도입(라포)→핵심→마무리 구조로 개방형 질문·프로브(후속 질문)를 만들고 유도질문을 자동 점검합니다."},
        {t:"검토·내보내기",d:"MD로 내보내면 퍼소나 스튜디오의 ‘인터뷰 가이드 → MD 불러오기’로 바로 쓸 수 있습니다."},
      ]}
      tips={[
        "생성물은 초안 — 현장 맥락·용어에 맞게 다듬어 쓰세요.",
        "‘유도질문·편향 점검’ 코멘트를 꼭 확인해 답을 미리 정해두는 질문을 제거하세요.",
        "도입 질문으로 라포(긴장 완화)를 만들고, 민감한 질문은 뒤쪽에 배치하는 게 정석입니다.",
      ]}/>
    <Card className="p-6">

      <div className="mb-3 flex flex-wrap items-center gap-2"><Btn size="sm" variant="outline" onClick={()=>{const POOL=[DEMO_GUIDE,{goal:"가입 직후 이탈하는 신규 사용자의 첫 화면 경험 파악",participant:"가입 후 3일 내 다시 안 들어온 신규 사용자",hyp:"첫 화면에서 뭘 해야 할지 몰라 이탈한다"},{goal:"판매자가 상품 등록을 중도 포기하는 이유 파악",participant:"상품 등록을 시작했다 그만둔 판매자",hyp:"사진·설명 입력 부담이 등록 완료를 막는다"}];const e=POOL[Math.floor(Math.random()*POOL.length)];setGoal(e.goal);setParticipant(e.participant);setHyp(e.hyp);setGuide(null);toast("ok","예제 설정을 넣었어요(누를 때마다 다른 예제) — ‘가이드 생성’을 눌러보세요");}}>▶ 예제로 해보기</Btn><span className="text-[12px] text-slate-400">누를 때마다 다른 예제 목표·대상</span></div>
      <div className="space-y-4">
        <Field label="리서치 목표"><input className={inputCls} value={goal} onChange={e=>setGoal(e.target.value)} placeholder="예: 첫 거래 전환을 막는 불안 요인 파악"/></Field>
        <div className="grid gap-3 sm:grid-cols-2"><Field label="인터뷰 대상"><input className={inputCls} value={participant} onChange={e=>setParticipant(e.target.value)} placeholder="예: 가입 후 미거래 사용자"/></Field><Field label="소요 시간(분)"><input type="number" min="15" max="120" className={inputCls} value={dur} onChange={e=>setDur(Math.max(15,Math.min(120,+e.target.value||60)))}/></Field></div>

      </div>
      <div className="mt-4"><Btn size="lg" onClick={run} disabled={busy}>{busy?<Spinner size={16}/>:"✨"} 가이드 생성 <span className="font-normal opacity-80">· {backendLabel(settings)}</span></Btn></div>
    </Card>
    {guide&&guide.sections&&<div className="flex flex-wrap items-center gap-2 rounded-2xl border border-brand/20 bg-brand-faint p-4 fade-in">
      <span className="text-[14px] font-bold text-ink">✅ 가이드 완성! 이제 →</span>
      <Btn size="sm" onClick={()=>{wsAdd("인터뷰 가이드",guideMd());saveSlot();toast("ok","보관함·프로젝트에 저장됨 — 이 가이드로 인터뷰한 뒤 ① 전사·요약 탭에서 정리하세요");}}>📤 보관함 저장</Btn>
      <span className="text-[13px] text-slate-500">이 가이드로 인터뷰 → <b>① 전사·요약</b> 탭에서 정리</span>
      <HelpCue title="가이드 다음은 뭐예요?" faqs={[{q:"가이드를 만들었으면?",a:"이 질문지로 실제 인터뷰를 진행하고, 그 녹음을 ① 전사·요약 탭에서 정리하면 돼요. 퍼소나 스튜디오에서 AI 사용자에게 자동 인터뷰도 가능해요."}]} settings={settings} openSettings={openSettings} toast={toast}/>
    </div>}
    {guide&&<Card className="p-6 fade-in">
      <div className="mb-4 flex flex-wrap items-center justify-between gap-2"><StepHead n={2} title="인터뷰 가이드" sub="섹션·질문·프로브" done={true}/>{guide.sections&&<div className="flex flex-wrap gap-2"><Btn size="sm" variant={confirmed?"primary":"outline"} onClick={()=>{const nv=!confirmed;saveSlot();if(window.UXAX&&UXAX.confirmSlot)UXAX.confirmSlot("P1.guide",nv);setConfirmed(nv);toast("ok",nv?"검수 완료로 표시했어요 — 다음 단계에서 ‘사람 확인됨’으로 보여요":"검수 표시를 해제했어요");}}>{confirmed?"✓ 검수 완료":"☐ 내가 검수함"}</Btn><WsSave title="인터뷰 가이드" getText={guideMd} toast={toast}/><Btn size="sm" variant="outline" onClick={()=>download("interview_guide.md",guideMd())}>↧ MD</Btn><Btn size="sm" variant="soft" onClick={()=>copyText(guideMd()).then(()=>toast("ok","복사됨 — 퍼소나 스튜디오로"))}>→ 복사</Btn></div>}</div>
      {guide.sections?<div className="space-y-4">
        {guide.sections.map((s,i)=><div key={i} className="rounded-xl border border-hair p-4"><div className="mb-2 font-bold text-ink">{i+1}. {S(s.name)}</div><ol className="ml-5 list-decimal space-y-2 text-[15px] text-ink">{arr(s.questions).map((q,j)=><li key={j}>{S(q.q)}{!!arr(q.probes).length&&<ul className="ml-3 mt-1 list-disc text-[13px] text-slate-500">{arr(q.probes).map((p,k)=><li key={k}>{S(p)}</li>)}</ul>}</li>)}</ol></div>)}
        {guide.time_plan&&<div><div className="mb-1 text-[12px] font-bold uppercase tracking-wide text-slate-400">시간 배분</div><p className="text-[14px] text-slate-600">{S(guide.time_plan)}</p></div>}
        {!!(guide.bias_notes||[]).length&&<div className="rounded-xl bg-amber-50 p-3"><div className="mb-1 text-[12px] font-bold uppercase tracking-wide text-amber-700">유도질문·편향 점검</div><ul className="ml-5 list-disc space-y-1 text-[13px] text-amber-800">{guide.bias_notes.map((b,i)=><li key={i}>{S(b)}</li>)}</ul></div>}
      </div>:<pre className="whitespace-pre-wrap rounded-xl bg-slate-50 p-3 text-[13px] text-slate-600">{guide.raw}</pre>}
    </Card>}
  </div>;
}

/* ============================================================
   Root
   ============================================================ */
const TABS=[{id:"interview",label:"① 인터뷰 전사·요약",pid:"P1-A1"},{id:"survey",label:"② 설문 자유응답 분류",pid:"P1-A2"},{id:"voc",label:"③ 리뷰·VOC 분석",pid:"P1-A3"},{id:"desk",label:"④ 데스크 리서치",pid:"P1-A4"},{id:"guide",label:"⑤ 인터뷰 가이드",pid:"P1-A5"}];
function App(){
  const[settings,setSettings]=useState(()=>{const s=load(SETTINGS_KEY,null);const fc=(window.UXAX_CONFIG&&window.UXAX_CONFIG.anthropicApiKey)||"";const def={backend:fc?"api":"manual",apiKey:fc,model:MODELS[0].id,ollamaUrl:"http://127.0.0.1:11434",ollamaModel:"",webllmModel:WEBLLM_PREFERRED[0]};return s?{...def,...s}:def;});
  const[tab,setTab]=useState(()=>{const h=(location.hash||"").replace("#","");return TABS.find(t=>t.id===h)?h:"interview";});
  const[showSettings,setShowSettings]=useState(false);const[toast,setToastState]=useState(null);const[,force]=useState(0);
  const ready=backendReady(settings);
  useEffect(()=>{save(SETTINGS_KEY,settings)},[settings]);
  useEffect(()=>{location.hash=tab},[tab]);
  useEffect(()=>{const f=()=>force(n=>n+1);manualBridge.notify=f;webllmLoader.notify=f;sttLoader.notify=f;embLoader.notify=f;return()=>{manualBridge.notify=null;webllmLoader.notify=null;sttLoader.notify=null;embLoader.notify=null;};},[]);
  const toastFn=useCallback((t,m)=>{setToastState({type:t,msg:m});setTimeout(()=>setToastState(null),3400)},[]);
  useEffect(()=>{if(settings.backendChosen||settings.backend!=="manual")return;(async()=>{try{const l=await ollamaListModels(settings.ollamaUrl,1500);if(l.length){setSettings(s=>({...s,backend:"ollama",ollamaModel:l[0]}));toastFn("ok","로컬 Ollama 자동 연결 · "+l[0]);}}catch(e){}})();/*eslint-disable-next-line*/},[]);
  const openSettings=()=>setShowSettings(true);
  return <div className="min-h-screen">
    <header className="sticky top-0 z-40 border-b border-hair bg-canvas/85 backdrop-blur-md">
      <div className="mx-auto flex max-w-[1100px] items-center gap-3 px-5 py-3">
        <a href="./index.html" className="rounded-[10px] px-2 py-1.5 text-sm text-slate-500 hover:bg-slate-100">← 홈</a>
        <div className="flex items-center gap-2.5"><div className="flex h-9 w-9 items-center justify-center rounded-[10px] bg-brand text-sm font-black text-white">P1</div><div><div className="text-[16px] font-extrabold leading-none tracking-tight text-ink">리서치 스튜디오</div><div className="text-[11px] text-slate-400">전사·설문코딩·VOC 분석 · 전부 무료</div></div></div>
        <div className="flex-1"/>
        <button onClick={openSettings} className={cx("hidden items-center gap-1.5 rounded-full px-3 py-1.5 text-[13px] font-semibold ring-1 ring-inset sm:inline-flex",ready?"bg-emerald-50 text-emerald-600 ring-emerald-100":"bg-amber-50 text-amber-600 ring-amber-100")}><span className={cx("h-1.5 w-1.5 rounded-full",ready?"bg-emerald-500":"bg-amber-500")}/>{backendLabel(settings)}</button>
        <button onClick={openSettings} className="rounded-[10px] p-2 text-slate-500 hover:bg-slate-100" title="설정">⚙</button>
      </div>
      <ProcessNav current={CURRENT_PHASE}/>
      <div className="mx-auto max-w-[1100px] overflow-x-auto px-3"><nav className="flex gap-1">{TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} className={cx("flex items-center gap-1.5 whitespace-nowrap border-b-2 px-4 py-2.5 text-sm font-semibold transition",tab===t.id?"border-brand text-brand-hover":"border-transparent text-slate-500 hover:text-ink")}>{t.label}<span className="text-[11px] text-slate-400">{t.pid}</span></button>)}</nav></div>
    </header>
    <main className="mx-auto max-w-[1100px] px-5 py-7">
      <GatePanel phase={CURRENT_PHASE}/>
      <div className={tab==="interview"?"":"hidden"}><InterviewPanel settings={settings} openSettings={openSettings} toast={toastFn}/></div>
      <div className={tab==="survey"?"":"hidden"}><SurveyPanel settings={settings} openSettings={openSettings} toast={toastFn}/></div>
      <div className={tab==="voc"?"":"hidden"}><VocPanel settings={settings} openSettings={openSettings} toast={toastFn}/></div>
      <div className={tab==="desk"?"":"hidden"}><DeskPanel settings={settings} openSettings={openSettings} toast={toastFn}/></div>
      <div className={tab==="guide"?"":"hidden"}><GuidePanel settings={settings} openSettings={openSettings} toast={toastFn}/></div>
    </main>
    <StageNav tab={tab} setTab={setTab}/>
    {showSettings&&<SettingsModal settings={settings} onSave={(s)=>{setSettings({...s,backendChosen:true});setShowSettings(false);toastFn("ok","설정 저장됨");}} onClose={()=>setShowSettings(false)}/>}
    <ManualModal req={manualBridge.current()} queueCount={manualBridge.count()} onSubmit={(t)=>manualBridge.resolveCurrent(t)} onCancel={()=>manualBridge.rejectCurrent()}/>
    <ProgressOverlay state={sttLoader} title="전사 모델 준비 중" emoji="🎙️"/>
    <ProgressOverlay state={embLoader} title="임베딩 모델 준비 중" emoji="🧮"/>
    <ProgressOverlay state={webllmLoader} title="브라우저 내장 AI 준비 중" emoji="🌐"/>
    <WorkspaceFab toast={toastFn}/>
    <MentorFab tab={tab} settings={settings} openSettings={openSettings} toast={toastFn}/>
    <Toast toast={toast}/>
  </div>;
}
window.addEventListener("error",(e)=>{const root=document.getElementById("root");if(root&&(!root.firstElementChild||root.dataset.errored)){if(root.dataset.errored)return;root.dataset.errored="1";root.innerHTML='<div style="padding:24px;font-family:Pretendard,system-ui,sans-serif;color:#b91c1c"><h2 style="font-weight:700;margin-bottom:8px">초기화 오류</h2><pre style="white-space:pre-wrap;color:#54576a">'+(e.message||e.error||"알 수 없는 오류")+'</pre></div>';}});
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
