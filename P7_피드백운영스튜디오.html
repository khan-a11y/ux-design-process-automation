async function copyText(t){try{await navigator.clipboard.writeText(t);return true}catch(e){const ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand("copy")}catch(e2){}document.body.removeChild(ta);return true}}

/* ===== 공유 워크스페이스(보관함) — 도구·앱 간 산출물 전달 ===== */

function wsAdd(title,text){if(!text||!String(text).trim())return false;const a=wsLoad();a.unshift({id:uid("ws"),title:title||"산출물",text:String(text),at:new Date().toLocaleString("ko-KR")});const ok=save(WS_KEY,a.slice(0,300));if(wsBus.notify)wsBus.notify();return ok;}

function _tryParse(s){try{return JSON.parse(s)}catch(e){}const c=s.replace(/\/\*[\s\S]*?\*\//g,"").replace(/^\s*\/\/.*$/gm,"").replace(/,(\s*[}\]])/g,"$1");try{return JSON.parse(c)}catch(e){}return undefined}
function parseJsonLoose(text){if(!text)return null;let t=String(text).trim();const f=t.match(/```(?:json)?\s*([\s\S]*?)```/i);if(f)t=f[1].trim();let r=_tryParse(t);if(r!==undefined)return r;const a=t.indexOf("["),o=t.indexOf("{");const st=a===-1?o:o===-1?a:Math.min(a,o);if(st===-1)return null;const op=t[st],cl=op==="["?"]":"}";let d=0,ins=false,esc=false;for(let i=st;i<t.length;i++){const c=t[i];if(ins){if(esc)esc=false;else if(c==="\\")esc=true;else if(c==='"')ins=false;}else{if(c==='"')ins=true;else if(c===op)d++;else if(c===cl){d--;if(!d){const r2=_tryParse(t.slice(st,i+1));if(r2!==undefined)return r2;}}}}const r3=_tryParse(t.slice(st));return r3===undefined?null:r3;}
function toCSV(rows){return rows.map(r=>r.map(c=>{const s=S(c);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(",")).join("\n");}

/* ===== 통계 (실제 계산) ===== */
function erf(x){const t=1/(1+0.3275911*Math.abs(x));const y=1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*Math.exp(-x*x);return x>=0?y:-y;}
function normCdf(x){return 0.5*(1+erf(x/Math.sqrt(2)));}
function abTest(cA,nA,cB,nB){if(!nA||!nB)return null;const pA=cA/nA,pB=cB/nB;const p=(cA+cB)/(nA+nB);const se=Math.sqrt(p*(1-p)*(1/nA+1/nB))||1e-9;const z=(pB-pA)/se;const pval=2*(1-normCdf(Math.abs(z)));const seD=Math.sqrt(pA*(1-pA)/nA+pB*(1-pB)/nB)||1e-9;const lift=pB-pA;return{pA,pB,z,pval,lift,ci:[lift-1.96*seD,lift+1.96*seD],sig:pval<0.05,relLift:pA?lift/pA:0};}
function detectAnomalies(series,thr=2){const vals=series.map(s=>s.v);if(!vals.length)return{points:[],mean:0,sd:0};const mean=vals.reduce((a,b)=>a+b,0)/vals.length;const sd=Math.sqrt(vals.reduce((a,b)=>a+(b-mean)**2,0)/vals.length)||1;return{points:series.map(s=>({...s,z:(s.v-mean)/sd,anom:Math.abs((s.v-mean)/sd)>=thr})),mean,sd};}

/* ===== LLM 엔진 ===== */
const API_URL="https://api.anthropic.com/v1/messages";
async function callClaude({apiKey,model,system,messages,maxTokens=4096,stream=false,onDelta,signal}){if(!apiKey){const e=new Error("API 키가 없습니다");e.code="NO_KEY";throw e;}const body={model,max_tokens:maxTokens,messages};if(system)body.system=system;if(stream)body.stream=true;const res=await fetch(API_URL,{method:"POST",headers:{"content-type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body),signal});if(!res.ok){let d="";try{const j=await res.json();d=j.error?.message||JSON.stringify(j)}catch(e){try{d=await res.text()}catch(e2){}}const err=new Error("API "+res.status+(d?" · "+d:""));err.status=res.status;throw err;}if(!stream){const data=await res.json();return (data.content||[]).map(b=>b.text||"").join("");}const rd=res.body.getReader();const dec=new TextDecoder();let buf="",full="";while(true){const{done,value}=await rd.read();if(done)break;buf+=dec.decode(value,{stream:true});let i;while((i=buf.indexOf("\n\n"))>=0){const blk=buf.slice(0,i);buf=buf.slice(i+2);const ln=blk.split("\n").find(l=>l.startsWith("data:"));if(!ln)continue;const p=ln.slice(5).trim();if(!p||p==="[DONE]")continue;try{const evt=JSON.parse(p);if(evt.type==="content_block_delta"&&evt.delta?.type==="text_delta"){full+=evt.delta.text;onDelta&&onDelta(full,evt.delta.text);}}catch(e){}}}return full;}
async function ollamaListModels(url,timeoutMs=3000){const base=(url||"http://127.0.0.1:11434").replace(/\/$/,"");const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),timeoutMs);try{const res=await fetch(base+"/api/tags",{signal:ctrl.signal});if(!res.ok)throw new Error("Ollama "+res.status);const d=await res.json();return (d.models||[]).map(m=>m.name);}finally{clearTimeout(t);}}
async function callOllama({url,model,system,messages,maxTokens=2000,stream=false,onDelta,signal}){const base=(url||"http://127.0.0.1:11434").replace(/\/$/,"");const msgs=[];if(system)msgs.push({role:"system",content:system});for(const m of messages)msgs.push({role:m.role,content:m.content});const res=await fetch(base+"/api/chat",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({model,messages:msgs,stream:!!stream,options:{num_predict:maxTokens,num_ctx:8192}}),signal});if(!res.ok){let d="";try{d=(await res.json()).error||""}catch(e){}throw new Error("Ollama "+res.status+(d?" · "+d:""));}if(!stream){const data=await res.json();return (data.message&&data.message.content)||"";}const rd=res.body.getReader();const dec=new TextDecoder();let buf="",full="";while(true){const{done,value}=await rd.read();if(done)break;buf+=dec.decode(value,{stream:true});let nl;while((nl=buf.indexOf("\n"))>=0){const ln=buf.slice(0,nl).trim();buf=buf.slice(nl+1);if(!ln)continue;try{const evt=JSON.parse(ln);if(evt.message?.content){full+=evt.message.content;onDelta&&onDelta(full,evt.message.content);}}catch(e){}}}return full;}
const WEBLLM_PREFERRED=["Qwen2.5-3B-Instruct-q4f16_1-MLC","Qwen2.5-7B-Instruct-q4f16_1-MLC","Llama-3.2-3B-Instruct-q4f16_1-MLC"];
const webllmState={lib:null,engine:null,modelId:null};const webllmLoader={active:false,progress:0,text:"",notify:null,set(a,p,t){this.active=a;this.progress=p;this.text=t;this.notify&&this.notify();}};
function hasWebGPU(){return typeof navigator!=="undefined"&&!!navigator.gpu;}
async function loadWebLLMLib(){if(!webllmState.lib)webllmState.lib=await import("https://esm.run/@mlc-ai/web-llm");return webllmState.lib;}
async function getWebLLMModels(){const w=await loadWebLLMLib();return (w.prebuiltAppConfig?.model_list||[]).map(m=>m.model_id);}
async function ensureWebLLM(modelId){if(!hasWebGPU())throw new Error("WebGPU 미지원");if(webllmState.engine&&webllmState.modelId===modelId)return webllmState.engine;const w=await loadWebLLMLib();const ids=(w.prebuiltAppConfig?.model_list||[]).map(m=>m.model_id);let id=modelId;if(!ids.includes(id))id=WEBLLM_PREFERRED.find(x=>ids.includes(x))||ids[0];if(webllmState.engine){try{await webllmState.engine.unload()}catch(e){}webllmState.engine=null;}webllmLoader.set(true,0,"브라우저 AI 준비 중…");let le=null;try{for(let a=1;a<=4;a++){try{webllmState.engine=await w.CreateMLCEngine(id,{initProgressCallback:(r)=>webllmLoader.set(true,r.progress||0,(a>1?"(재시도 "+a+") ":"")+(r.text||""))},{context_window_size:8192});webllmState.modelId=id;le=null;break;}catch(e){le=e;await new Promise(r=>setTimeout(r,1500));}}}finally{webllmLoader.set(false,1,"");}if(le)throw new Error("브라우저 AI 다운로드 실패");return webllmState.engine;}
async function callWebLLM({model,system,messages,maxTokens=2000,stream=false,onDelta}){const eng=await ensureWebLLM(model);const msgs=[];if(system)msgs.push({role:"system",content:system});for(const m of messages)msgs.push({role:m.role,content:m.content});const cap=Math.min(maxTokens,3600);if(stream){let full="";const ch=await eng.chat.completions.create({messages:msgs,stream:true,max_tokens:cap});for await(const c of ch){const d=(c.choices&&c.choices[0]&&c.choices[0].delta&&c.choices[0].delta.content)||"";if(d){full+=d;onDelta&&onDelta(full,d);}}return full;}const r=await eng.chat.completions.create({messages:msgs,max_tokens:cap});return (r.choices&&r.choices[0]&&r.choices[0].message&&r.choices[0].message.content)||"";}
const manualBridge={queue:[],notify:null,request(p,m){return new Promise((res,rej)=>{this.queue.push({id:uid("m"),promptText:p,meta:m||{},resolve:res,reject:rej});this.notify&&this.notify();})},current(){return this.queue[0]||null},count(){return this.queue.length},resolveCurrent(t){const c=this.queue.shift();if(c)c.resolve(t);this.notify&&this.notify();},rejectCurrent(e){const c=this.queue.shift();if(c)c.reject(e||new Error("취소"));this.notify&&this.notify();}};
async function callManual({system,messages,onDelta,meta}){let t="";if(system)t+=system+"\n\n";t+=messages.map(m=>m.content).join("\n\n");const out=await manualBridge.request(t,meta);onDelta&&onDelta(out,out);return out;}
async function runLLM(settings,opts){const b=settings.backend||"manual";if(b==="ollama")return callOllama({url:settings.ollamaUrl,model:settings.ollamaModel,...opts});if(b==="webllm")return callWebLLM({model:settings.webllmModel,...opts});if(b==="manual")return callManual(opts);return callClaude({apiKey:settings.apiKey,model:settings.model,...opts});}
function backendReady(s){const b=s.backend||"manual";if(b==="manual")return true;if(b==="ollama")return !!s.ollamaModel;if(b==="webllm")return hasWebGPU();return !!(s.apiKey&&s.apiKey.length>10);}
function backendLabel(s){const b=s.backend||"manual";if(b==="manual")return "수동/챗GPT 모드";if(b==="ollama")return "로컬 Ollama"+(s.ollamaModel?" · "+s.ollamaModel:"");if(b==="webllm")return "브라우저 내장 AI";return "Anthropic API";}

/* ===== 프롬프트 ===== */
const SYS="당신은 프로덕트 애널리스트이자 운영 분석가입니다. 데이터를 구조화하고 실행 가능한 권고를 냅니다. 한국어로, JSON 요청 시 순수 JSON만 출력합니다.";
function buildFeedbackPrompt(chunk){return `아래 피드백을 처리하세요. 각 항목을 주제·유형(버그/요청/칭찬/이탈/기타)·감성(pos/neu/neg)·우선순위(1~5)로 분류하고 즉시대응 필요 여부 표시. JSON만(입력 id 유지):
{ "items":[{"id":"id","topic":"주제","type":"버그|요청|칭찬|이탈|기타","sentiment":"pos|neu|neg","priority":1,"urgent":true}] }

[피드백]
${chunk.map(r=>`(${r.id}) ${r.text}`).join("\n")}`;}
function buildAbInterpretPrompt(stats,ctx){return `아래는 이미 계산된 A/B 테스트 통계입니다. 비전문가용으로 해석하세요.${ctx?"\n맥락: "+ctx:""}
계산값: A 전환율 ${(stats.pA*100).toFixed(2)}%, B 전환율 ${(stats.pB*100).toFixed(2)}%, 절대 차이 ${(stats.lift*100).toFixed(2)}%p, p값 ${stats.pval.toFixed(4)}, 95% 신뢰구간 [${(stats.ci[0]*100).toFixed(2)}%p, ${(stats.ci[1]*100).toFixed(2)}%p], 유의성 ${stats.sig?"유의함(p<0.05)":"유의하지 않음"}.
JSON만: { "summary":"3줄 평이한 요약", "recommendation":"채택|보류|재실험", "rationale":"근거", "caveats":["주의할 편향·한계"] }`;}
function buildAnomalyHypoPrompt(anoms,ctx){return `아래는 통계적으로 탐지된 이상치(평균 대비 z-score 큰 지점)입니다. 각 이상의 가능한 원인 가설과 확인 방법을 제시하세요.${ctx?"\n맥락: "+ctx:""}
JSON만: { "items":[{"when":"시점","value":"값","z":"z-score","hypotheses":["원인 가설"],"check":"확인 방법"}] }

[이상치]
${anoms.map(a=>`${a.t}: ${a.v} (z=${a.z.toFixed(2)})`).join("\n")}`;}
function buildOpsPrompt(chunk){return `아래 운영 피드백을 처리하세요. 주제·담당팀(제품/디자인/CS/개발) 분류·라우팅, 중복 병합·빈도, 급증 토픽, 백로그(제목·설명·우선순위). JSON만:
{ "routed":[{"topic":"주제","team":"제품|디자인|CS|개발","count":0}], "backlog":[{"title":"제목","desc":"설명","priority":1}], "trending":["급증 토픽"] }

[피드백]
${chunk.map((t,i)=>`${i+1}. ${t}`).join("\n")}`;}

function SettingsModal({settings,onSave,onClose}){const[draft,setDraft]=useState({backend:"manual",ollamaUrl:"http://127.0.0.1:11434",ollamaModel:"",webllmModel:WEBLLM_PREFERRED[0],model:MODELS[0].id,apiKey:"",...settings});const[testing,setTesting]=useState(false);const[tr,setTr]=useState(null);const[om,setOm]=useState([]);const[lo,setLo]=useState(false);const[wm,setWm]=useState([]);const[lw,setLw]=useState(false);const refreshO=useCallback(async()=>{setLo(true);setTr(null);try{const l=await ollamaListModels(draft.ollamaUrl);setOm(l);if(l.length&&!l.includes(draft.ollamaModel))setDraft(d=>({...d,ollamaModel:l[0]}));if(!l.length)setTr({ok:false,msg:"모델 없음 → ollama pull qwen2.5:3b"});}catch(e){setTr({ok:false,msg:"연결 실패 — start-ollama.bat"});setOm([]);}finally{setLo(false);}},[draft.ollamaUrl,draft.ollamaModel]);const refreshW=useCallback(async()=>{setLw(true);setTr(null);try{const l=await getWebLLMModels();setWm(l);if(l.length&&!l.includes(draft.webllmModel))setDraft(d=>({...d,webllmModel:WEBLLM_PREFERRED.find(x=>l.includes(x))||l[0]}));}catch(e){setTr({ok:false,msg:"목록 로드 실패"});}finally{setLw(false);}},[draft.webllmModel]);useEffect(()=>{if(draft.backend==="ollama")refreshO();if(draft.backend==="webllm")refreshW();/*eslint-disable-next-line*/},[draft.backend]);const test=async()=>{setTesting(true);setTr(null);try{if(draft.backend==="ollama"){const o=await callOllama({url:draft.ollamaUrl,model:draft.ollamaModel,messages:[{role:"user",content:"OK"}],maxTokens:10});setTr({ok:true,msg:"응답: "+(o||"").slice(0,20)});}else if(draft.backend==="webllm")setTr(hasWebGPU()?{ok:true,msg:"WebGPU ✓"}:{ok:false,msg:"WebGPU 미지원"});else if(draft.backend==="api"){await callClaude({apiKey:draft.apiKey,model:draft.model,maxTokens:16,messages:[{role:"user",content:"ping"}]});setTr({ok:true,msg:"연결 성공!"});}else setTr({ok:true,msg:"수동 모드 바로 사용 가능"});}catch(e){setTr({ok:false,msg:e.message});}finally{setTesting(false);}};return <div className="fixed inset-0 z-[80] flex items-center justify-       why="A/B 해석은 통계 지식이 필요해 오판이 잦습니다(작은 차이를 ‘이겼다’고 착각 등). 통계는 코드로 정확히 계산하고 AI는 해설만 맡겨, 비전문가도 올바른 결론을 빠르게 내립니다."
      inputs={[

    <Card className="p-6"><div className="mb-3 flex items-center gap-1"><StepHead n={1} title="A/B 데이터" done={!!res}/><HelpCue title="A/B 해석" faqs={AB_FAQ} settings={settings} openSettings={openSettings} toast={toast}/></div><div className="mb-3"><Btn size="sm" variant="outline" onClick={()=>{setCA(DEMO_AB.cA);setNA(DEMO_AB.nA);setCB(DEMO_AB.cB);setNB(DEMO_AB.nB);setCtx(DEMO_AB.ctx);setRes(null);toast("ok","예제 A/B 수치 — 통계가 자동 계산돼요. ‘AI 해석·권고’를 눌러보세요");}}>▶ 예제로 해보기</Btn></div>

        <div><div className="text-[12px] text-slate-400">p값</div><div className={cx("text-lg font-bold",stats.sig?"text-emerald-600":"text-amber-600")}>{stats.pval.toFixed(4)}</div></div>

/* ===== ③ 이상탐지 (z-score 실계산) ===== */
function AnomalyPanel({settings,openSettings,toast}){
  const K="uxax_p6a4_v1";const sv=load(K,{});
  const[text,setText]=useState(sv.text||"");const[ctx,setCtx]=useState(sv.ctx||"");const[thr,setThr]=useState(sv.thr||2);const[det,setDet]=useState(null);const[res,setRes]=useState(sv.res||null);const[busy,setBusy]=useState(false);
  useEffect(()=>{save(K,{text,ctx,thr,res})},[text,ctx,thr,res]);
  const parseSeries=()=>text.split(/\n/).map(l=>l.trim()).filter(Boolean).map(l=>{const m=/^(.+?)[\s,\t]+([-\d.]+)\s*%?$/.exec(l);return m?{t:m[1].trim(),v:+m[2]}:null;}).filter(Boolean);
  const anomalyMd=()=>det?("# 이상탐지\n평균 "+det.mean.toFixed(2)+" · σ "+det.sd.toFixed(2)+"\n이상치: "+det.points.filter(p=>p.anom).map(p=>p.t+"="+p.v+"(z"+p.z.toFixed(1)+")").join(", ")):"";
  const[confirmed,setConfirmed]=useState(()=>{const s=(window.UXAX&&UXAX.getSlot&&UXAX.getSlot("P7.anomaly"));return !!(s&&s.meta&&s.meta.human_confirmed);});
  const saveSlot=()=>{if(window.UXAX&&UXAX.setSlot&&det)UXAX.setSlot("P7.anomaly",{data:{det},md:anomalyMd(),meta:{model:backendLabel(settings),items:det.points.filter(p=>p.anom).length}});};
  const compute=()=>{const s=parseSeries();if(s.length<3){toast("error","'날짜 값' 형식으로 3줄 이상");return;}const d=detectAnomalies(s,+thr);setDet(d);setRes(null);const an=d.points.filter(p=>p.anom);toast("ok",`이상치 ${an.length}건 탐지 (평균 ${d.mean.toFixed(2)}, σ ${d.sd.toFixed(2)})`);};
  const explain=async()=>{if(!det){toast("error","먼저 이상치를 계산하세요");return;}const an=det.points.filter(p=>p.anom);if(!an.length){toast("info","이상치가 없어요");return;}if(!backendReady(settings)){toast("error","AI 엔진을 설정하세요");openSettings();return;}setBusy(true);setRes(null);try{const out=await runLLM(settings,{system:SYS,messages:[{role:"user",content:buildAnomalyHypoPrompt(an,ctx)}],maxTokens:1800,stream:false,meta:{who:"이상 원인 가설"}});const p=parseJsonLoose(out);setRes((p&&p.items)||{raw:out});if(p&&p.items)setRes(p.items);toast("ok","가설 생성 완료");}catch(e){toast("error","실패: "+(e.message||e));}finally{setBusy(false);}};
  const Chart=()=>{if(!det||!det.points.length)return null;const pts=det.points;const w=Math.max(360,pts.length*36),h=140,pad=24;const vs=pts.map(p=>p.v);const mn=Math.min(...vs),mx=Math.max(...vs),rng=(mx-mn)||1;const xy=pts.map((p,i)=>[pad+(pts.length>1?i*(w-2*pad)/(pts.length-1):0),h-pad-((p.v-mn)/rng)*(h-2*pad)]);const path=xy.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");const my=h-pad-((det.mean-mn)/rng)*(h-2*pad);return <svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" className="rounded-xl border border-hair bg-white" style={{maxHeight:170}}><line x1={pad} y1={my} x2={w-pad} y2={my} stroke="#cbd5e1" strokeDasharray="4 4"/><path d={path} fill="none" stroke="#5e6ad2" strokeWidth="2"/>{xy.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r={pts[i].anom?5:3} fill={pts[i].anom?"#f43f5e":"#5e6ad2"}/>)}</svg>;};
  return <div className="space-y-6">
    <Guide defaultOpen={!det}
      what="지표 시계열을 넣으면 브라우저가 평균·표준편차로 각 지점의 z-score를 계산해 평소와 크게 벗어난 ‘이상치’를 자동 탐지(그래프에 빨갛게 표시)하고, 그 이상에 대해 AI가 가능한 원인 가설과 확인 방법을 제시하는 도구입니다."
      where="UX 6단계 ‘개선(Iterate)’의 운영 모니터링. 출시 후 전환율·이탈률 같은 KPI가 갑자기 떨어지거나 튀는 지점을 조기에 잡을 때 씁니다. 발견은 원인 조사·핫픽스로 이어집니다."
      why="대시보드 숫자를 매일 눈으로 보긴 어렵습니다. 통계적으로 ‘이건 평소와 다르다’를 자동으로 짚어주면 문제를 빨리 인지하고, AI 가설로 조사 방향을 빠르게 잡습니다."
      inputs={[
        {field:"지표 시계열", desc:"‘날짜(또는 라벨)  값’을 한 줄에 하나. %·단위는 빼고 숫자만이 깔끔합니다.", ex:"2026-06-01  3.2 / 2026-06-02  3.1 / 2026-06-04  1.4"},
        {field:"임계값 (σ)", desc:"평균에서 몇 표준편차 벗어나면 이상으로 볼지. 기본 2(민감), 3은 더 보수적.", ex:"2"},
        {field:"맥락 (선택)", desc:"무슨 지표인지. AI 원인 가설이 구체적이 됩니다.", ex:"일일 결제 전환율(%)"},
      ]}
      steps={[
        {t:"지표 붙여넣기",d:"‘날짜  값’ 형식으로 줄마다 입력합니다."},
        {t:"이상치 계산",d:"브라우저가 z-score를 계산하고 임계값(기본 2σ)을 넘는 지점을 빨갛게 표시합니다."},
        {t:"원인 가설",d:"탐지된 이상에 대해 AI가 가능한 원인 가설과 확인 방법을 제시합니다."},
      ]}
      tips={[
        "z-score 기반 ‘단순’ 탐지입니다 — 요일/계절성·장기 추세가 강하면 별도 검토가 필요해요.",
        "탐지(계산)는 브라우저에서 정확히 수행되고, AI는 ‘원인 가설’에만 씁니다.",
        "이상이 진짜인지(데이터 오류·이벤트 영향)부터 확인하고 대응 우선순위를 정하세요.",
      ]}/>
    <Card className="p-6"><div className="mb-3 flex items-center gap-1"><StepHead n={1} title="지표 입력 & 탐지" done={!!det}/><HelpCue title="이상탐지" faqs={ANOMALY_FAQ} settings={settings} openSettings={openSettings} toast={toast}/></div><div className="mb-3"><Btn size="sm" variant="outline" onClick={()=>{setText(DEMO_ANOMALY.text);setCtx(DEMO_ANOMALY.ctx);setRes(null);toast("ok","예제 시계열 — ‘이상치 계산’을 눌러보세요");}}>▶ 예제로 해보기</Btn></div>

  // P0 정의 → 게이트 연결: 목표는 P0 '한 줄 정의', 합격선은 P0 '성공 기준'에서 가져올 수 있게(프리필).

      <div className="mt-3 flex flex-wrap items-center justify-between gap-2">
        <div className="text-[12.5px] text-slate-500">{allOk?"6칸 모두 충족 — 자신 있게 진행하거나 다음 단계로 넘어가도 좋아요.":"빈 칸·⚠ 항목을 채우면 더 단단해져요. (강제는 아니에요 — 판단을 돕는 체크리스트)"}</div>
        <Btn size="sm" variant={confirmed?"ghost":"soft"} onClick={()=>{if(window.UXAX&&UXAX.setGate)UXAX.setGate(phase,{confirmed:!confirmed});force(n=>n+1);}}>{confirmed?"✓ 마무리 점검 해제":"이 단계 마무리 점검 통과로 표시"}</Btn>
      </div>
    </div>}
  </div>;
}
/* 하단 단계 네비 — 같은 단계 안 탭 이동(이전/다음) + 이전 단계 돌아가기 + 다음 단계로 진행 */
function StageNav({tab,setTab}){
  const i=TABS.findIndex(t=>t.id===tab);const prevTab=TABS[i-1],nextTab=TABS[i+1];
  const pi=PROCESS.findIndex(p=>p.id===CURRENT_PHASE);const prevPhase=PROCESS[pi-1],nextPhase=PROCESS[pi+1];const curName=(PROCESS[pi]||{}).name||"";
  return <nav className="no-print mx-auto mt-10 mb-36 max-w-[1100px] px-5">
    <div className="rounded-2xl border border-hair bg-white p-4 shadow-soft">
      <div className="mb-3 flex items-center justify-between gap-2">
        <button onClick={()=>prevTab&&setTab(prevTab.id)} disabled={!prevTab} className={cx("inline-flex min-w-0 items-center gap-1.5 rounded-[10px] border border-hair px-3 py-2 text-[13px] font-semibold transition",prevTab?"text-slate-600 hover:bg-slate-50":"cursor-default opacity-40")}>← <span className="truncate">{prevTab?prevTab.label:"이 단계 처음"}</span></button>
        <div className="shrink-0 text-center text-[12px] text-slate-400">{CURRENT_PHASE} {curName} 안에서 <b className="text-brand-hover">{i+1} / {TABS.length}</b></div>
        <button onClick={()=>nextTab&&setTab(nextTab.id)} disabled={!nextTab} className={cx("inline-flex min-w-0 items-center gap-1.5 rounded-[10px] border border-hair px-3 py-2 text-[13px] font-semibold transition",nextTab?"text-slate-600 hover:bg-slate-50":"cursor-default opacity-40")}><span className="truncate">{nextTab?nextTab.label:"이 단계 마지막"}</span> →</button>
      </div>
      <div className="flex flex-wrap items-center justify-between gap-2 border-t border-hair pt-3">
        <a href={prevPhase?("./"+prevPhase.file):"./index.html"} className="inline-flex items-center gap-1.5 rounded-[10px] px-3 py-2 text-[13px] font-semibold text-slate-500 hover:bg-slate-100">↩ {prevPhase?(prevPhase.id+" "+prevPhase.name+"로 돌아가기"):"홈 · 프로젝트 정의(P0)"}</a>
        {nextPhase&&<a href={"./"+nextPhase.file} className="inline-flex items-center gap-2 rounded-[10px] bg-brand px-4 py-2.5 text-[13px] font-bold text-white shadow-sm hover:bg-brand-hover" title="이 단계를 마쳤다면 다음 단계로">다음 단계 → {nextPhase.id} {nextPhase.name}</a>}
      </div>
    </div>
  </nav>;
}
function App(){
  const[settings,setSettings]=useState(()=>{const s=load(SETTINGS_KEY,null);const fc=(window.UXAX_CONFIG&&window.UXAX_CONFIG.anthropicApiKey)||"";const def={backend:fc?"api":"manual",apiKey:fc,model:MODELS[0].id,ollamaUrl:"http://127.0.0.1:11434",ollamaModel:"",webllmModel:WEBLLM_PREFERRED[0]};return s?{...def,...s}:def;});
  const[tab,setTab]=useState(()=>{const h=(location.hash||"").replace("#","");return TABS.find(t=>t.id===h)?h:"feedback";});
  const[showSettings,setShowSettings]=useState(false);const[toast,setToastState]=useState(null);const[,force]=useState(0);
  const ready=backendReady(settings);
  useEffect(()=>{save(SETTINGS_KEY,settings)},[settings]);useEffect(()=>{location.hash=tab},[tab]);useEffect(()=>{const h=()=>{const x=(location.hash||"").replace("#","");if(TABS.find(t=>t.id===x))setTab(x);};window.addEventListener("hashchange",h);return()=>window.removeEventListener("hashchange",h);},[]);
  useEffect(()=>{const f=()=>force(n=>n+1);manualBridge.notify=f;webllmLoader.notify=f;return()=>{manualBridge.notify=null;webllmLoader.notify=null;};},[]);
  const toastFn=useCallback((t,m)=>{setToastState({type:t,msg:m});setTimeout(()=>setToastState(null),3400)},[]);
  useEffect(()=>{if(settings.backendChosen||settings.backend!=="manual")return;(async()=>{try{const l=await ollamaListModels(settings.ollamaUrl,1500);if(l.length){setSettings(s=>({...s,backend:"ollama",ollamaModel:l[0]}));toastFn("ok","로컬 Ollama 자동 연결");}}catch(e){}})();/*eslint-disable-next-line*/},[]);
  const openSettings=()=>setShowSettings(true);
  return <div className="min-h-screen">
    <header className="sticky top-0 z-40 border-b border-hair bg-canvas/85 backdrop-blur-md">
      <div className="mx-auto flex max-w-[1100px] items-center gap-3 px-5 py-3"><a href="./index.html" className="rounded-[10px] px-2 py-1.5 text-sm text-slate-500 hover:bg-slate-100">← 홈</a><div className="flex items-center gap-2.5"><div className="flex h-9 w-9 items-center justify-center rounded-[10px] bg-brand text-base font-black text-white">📊</div><div><div className="text-[16px] font-extrabold leading-none tracking-tight text-ink">피드백·운영 분석 스튜디오</div><div className="text-[11px] text-slate-400">피드백·A/B·이상탐지·운영 · 무료</div></div></div><div className="flex-1"/><button onClick={openSettings} className={cx("hidden items-center gap-1.5 rounded-full px-3 py-1.5 text-[13px] font-semibold ring-1 ring-inset sm:inline-flex",ready?"bg-emerald-50 text-emerald-600 ring-emerald-100":"bg-amber-50 text-amber-600 ring-amber-100")}><span className={cx("h-1.5 w-1.5 rounded-full",ready?"bg-emerald-500":"bg-amber-500")}/>{backendLabel(settings)}</button><button onClick={openSettings} className="rounded-[10px] p-2 text-slate-500 hover:bg-slate-100" title="설정">⚙</button></div>
      <ProcessNav current={CURRENT_PHASE}/>
      <div className="mx-auto max-w-[1100px] overflow-x-auto px-3"><nav className="flex gap-1">{TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} className={cx("flex items-center gap-1.5 whitespace-nowrap border-b-2 px-4 py-2.5 text-sm font-semibold transition",tab===t.id?"border-brand text-brand-hover":"border-transparent text-slate-500 hover:text-ink")}>{t.label}<span className="text-[11px] text-slate-400">{t.pid}</span></button>)}</nav></div>
    </header>
    <main className="mx-auto max-w-[1100px] px-5 py-7">
      <GatePanel phase={CURRENT_PHASE}/>
      <div className={tab==="feedback"?"":"hidden"}><FeedbackPanel settings={settings} openSettings={openSettings} toast={toastFn}/></div>
      <div className={tab==="ab"?"":"hidden"}><AbPanel settings={settings} openSettings={openSettings} toast={toastFn}/></div>
      <div className={tab==="anomaly"?"":"hidden"}><AnomalyPanel settings={settings} openSettings={openSettings} toast={toastFn}/></div>
      <div className={tab==="ops"?"":"hidden"}><OpsPanel settings={settings} openSettings={openSettings} toast={toastFn}/></div>
    </main>
    <StageNav tab={tab} setTab={setTab}/>
    {showSettings&&<SettingsModal settings={settings} onSave={(s)=>{setSettings({...s,backendChosen:true});setShowSettings(false);toastFn("ok","설정 저장됨");}} onClose={()=>setShowSettings(false)}/>}
    <ManualModal req={manualBridge.current()} queueCount={manualBridge.count()} onSubmit={(t)=>manualBridge.resolveCurrent(t)} onCancel={()=>manualBridge.rejectCurrent()}/>
    <ProgressOverlay state={webllmLoader} title="브라우저 내장 AI 준비 중" emoji="🌐"/>
    <WorkspaceFab toast={toastFn}/>
    <Toast toast={toast}/>
  </div>;
}
window.addEventListener("error",(e)=>{const root=document.getElementById("root");if(root&&(!root.firstElementChild||root.dataset.errored)){if(root.dataset.errored)return;root.dataset.errored="1";root.innerHTML='<div style="padding:24px;font-family:Pretendard,system-ui,sans-serif;color:#b91c1c"><h2 style="font-weight:700;margin-bottom:8px">초기화 오류</h2><pre style="white-space:pre-wrap;color:#54576a">'+(e.message||e.error||"알 수 없는 오류")+'</pre></div>';}});
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
