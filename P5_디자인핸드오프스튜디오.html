function _tryParse(s){try{return JSON.parse(s)}catch(e){}const c=s.replace(/\/\*[\s\S]*?\*\//g,"").replace(/^\s*\/\/.*$/gm,"").replace(/,(\s*[}\]])/g,"$1");try{return JSON.parse(c)}catch(e){}return undefined}
function parseJsonLoose(text){if(!text)return null;let t=String(text).trim();const f=t.match(/```(?:json)?\s*([\s\S]*?)```/i);if(f)t=f[1].trim();let r=_tryParse(t);if(r!==undefined)return r;const a=t.indexOf("["),o=t.indexOf("{");const st=a===-1?o:o===-1?a:Math.min(a,o);if(st===-1)return null;const op=t[st],cl=op==="["?"]":"}";let d=0,ins=false,esc=false;for(let i=st;i<t.length;i++){const c=t[i];if(ins){if(esc)esc=false;else if(c==="\\")esc=true;else if(c==='"')ins=false;}else{if(c==='"')ins=true;else if(c===op)d++;else if(c===cl){d--;if(!d){const r2=_tryParse(t.slice(st,i+1));if(r2!==undefined)return r2;}}}}const r3=_tryParse(t.slice(st));return r3===undefined?null:r3;}
function fileToImagePart(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>{const url=r.result;const m=/^data:(.*?);base64,(.*)$/.exec(url);if(!m)return rej(new Error("이미지 형식 오류"));res({url,part:{type:"image",source:{type:"base64",media_type:m[1],data:m[2]}}});};r.onerror=rej;r.readAsDataURL(file);});}

/* ===== LLM 엔진 ===== */
const API_URL="https://api.anthropic.com/v1/messages";
async function callClaude({apiKey,model,system,messages,maxTokens=4096,stream=false,onDelta,signal}){if(!apiKey){const e=new Error("API 키가 없습니다");e.code="NO_KEY";throw e;}const body={model,max_tokens:maxTokens,messages};if(system)body.system=system;if(stream)body.stream=true;const res=await fetch(API_URL,{method:"POST",headers:{"content-type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body),signal});if(!res.ok){let d="";try{const j=await res.json();d=j.error?.message||JSON.stringify(j)}catch(e){try{d=await res.text()}catch(e2){}}const err=new Error("API "+res.status+(d?" · "+d:""));err.status=res.status;throw err;}if(!stream){const data=await res.json();return (data.content||[]).map(b=>b.text||"").join("");}const rd=res.body.getReader();const dec=new TextDecoder();let buf="",full="";while(true){const{done,value}=await rd.read();if(done)break;buf+=dec.decode(value,{stream:true});let i;while((i=buf.indexOf("\n\n"))>=0){const blk=buf.slice(0,i);buf=buf.slice(i+2);const ln=blk.split("\n").find(l=>l.startsWith("data:"));if(!ln)continue;const p=ln.slice(5).trim();if(!p||p==="[DONE]")continue;try{const evt=JSON.parse(p);if(evt.type==="content_block_delta"&&evt.delta?.type==="text_delta"){full+=evt.delta.text;onDelta&&onDelta(full,evt.delta.text);}}catch(e){}}}return full;}
function textOf(content){return Array.isArray(content)?content.map(p=>p.type==="text"?p.text:(p.type==="image"?"[이미지 첨부]":"")).join("\n"):(content||"");}
async function ollamaListModels(url,timeoutMs=3000){const base=(url||"http://127.0.0.1:11434").replace(/\/$/,"");const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),timeoutMs);try{const res=await fetch(base+"/api/tags",{signal:ctrl.signal});if(!res.ok)throw new Error("Ollama "+res.status);const d=await res.json();return (d.models||[]).map(m=>m.name);}finally{clearTimeout(t);}}
async function callOllama({url,model,system,messages,maxTokens=2000,stream=false,onDelta,signal}){const base=(url||"http://127.0.0.1:11434").replace(/\/$/,"");const msgs=[];if(system)msgs.push({role:"system",content:system});for(const m of messages)msgs.push({role:m.role,content:textOf(m.content)});const res=await fetch(base+"/api/chat",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({model,messages:msgs,stream:!!stream,options:{num_predict:maxTokens,num_ctx:8192}}),signal});if(!res.ok){let d="";try{d=(await res.json()).error||""}catch(e){}throw new Error("Ollama "+res.status+(d?" · "+d:""));}if(!stream){const data=await res.json();return (data.message&&data.message.content)||"";}const rd=res.body.getReader();const dec=new TextDecoder();let buf="",full="";while(true){const{done,value}=await rd.read();if(done)break;buf+=dec.decode(value,{stream:true});let nl;while((nl=buf.indexOf("\n"))>=0){const ln=buf.slice(0,nl).trim();buf=buf.slice(nl+1);if(!ln)continue;try{const evt=JSON.parse(ln);if(evt.message?.content){full+=evt.message.content;onDelta&&onDelta(full,evt.message.content);}}catch(e){}}}return full;}
const WEBLLM_PREFERRED=["Qwen2.5-3B-Instruct-q4f16_1-MLC","Qwen2.5-7B-Instruct-q4f16_1-MLC","Llama-3.2-3B-Instruct-q4f16_1-MLC"];
const webllmState={lib:null,engine:null,modelId:null};const webllmLoader={active:false,progress:0,text:"",notify:null,set(a,p,t){this.active=a;this.progress=p;this.text=t;this.notify&&this.notify();}};
function hasWebGPU(){return typeof navigator!=="undefined"&&!!navigator.gpu;}
async function loadWebLLMLib(){if(!webllmState.lib)webllmState.lib=await import("https://esm.run/@mlc-ai/web-llm");return webllmState.lib;}
async function getWebLLMModels(){const w=await loadWebLLMLib();return (w.prebuiltAppConfig?.model_list||[]).map(m=>m.model_id);}
async function ensureWebLLM(modelId){if(!hasWebGPU())throw new Error("WebGPU 미지원");if(webllmState.engine&&webllmState.modelId===modelId)return webllmState.engine;const w=await loadWebLLMLib();const ids=(w.prebuiltAppConfig?.model_list||[]).map(m=>m.model_id);let id=modelId;if(!ids.includes(id))id=WEBLLM_PREFERRED.find(x=>ids.includes(x))||ids[0];if(webllmState.engine){try{await webllmState.engine.unload()}catch(e){}webllmState.engine=null;}webllmLoader.set(true,0,"브라우저 AI 준비 중…");let le=null;try{for(let a=1;a<=4;a++){try{webllmState.engine=await w.CreateMLCEngine(id,{initProgressCallback:(r)=>webllmLoader.set(true,r.progress||0,(a>1?"(재시도 "+a+") ":"")+(r.text||""))},{context_window_size:8192});webllmState.modelId=id;le=null;break;}catch(e){le=e;await new Promise(r=>setTimeout(r,1500));}}}finally{webllmLoader.set(false,1,"");}if(le)throw new Error("브라우저 AI 다운로드 실패");return webllmState.engine;}
async function callWebLLM({model,system,messages,maxTokens=2000,stream=false,onDelta}){const eng=await ensureWebLLM(model);const msgs=[];if(system)msgs.push({role:"system",content:system});for(const m of messages)msgs.push({role:m.role,content:textOf(m.content)});const cap=Math.min(maxTokens,3600);if(stream){let full="";const ch=await eng.chat.completions.create({messages:msgs,stream:true,max_tokens:cap});for await(const c of ch){const d=(c.choices&&c.choices[0]&&c.choices[0].delta&&c.choices[0].delta.content)||"";if(d){full+=d;onDelta&&onDelta(full,d);}}return full;}const r=await eng.chat.completions.create({messages:msgs,max_tokens:cap});return (r.choices&&r.choices[0]&&r.choices[0].message&&r.choices[0].message.content)||"";}
const manualBridge={queue:[],notify:null,request(p,m){return new Promise((res,rej)=>{this.queue.push({id:uid("m"),promptText:p,meta:m||{},resolve:res,reject:rej});this.notify&&this.notify();})},current(){return this.queue[0]||null},count(){return this.queue.length},resolveCurrent(t){const c=this.queue.shift();if(c)c.resolve(t);this.notify&&this.notify();},rejectCurrent(e){const c=this.queue.shift();if(c)c.reject(e||new Error("취소"));this.notify&&this.notify();}};
async function callManual({system,messages,onDelta,meta}){let t="";if(system)t+=system+"\n\n";const hasImg=messages.some(m=>Array.isArray(m.content)&&m.content.some(p=>p.type==="image"));t+=messages.map(m=>textOf(m.content)).join("\n\n");if(hasImg)t+="\n\n(※ 이미지 작업: 챗봇에 이미지를 직접 올린 뒤 위 지시를 붙여넣으세요.)";const out=await manualBridge.request(t,meta);onDelta&&onDelta(out,out);return out;}
async function runLLM(settings,opts){const b=settings.backend||"manual";if(b==="ollama")return callOllama({url:settings.ollamaUrl,model:settings.ollamaModel,...opts});if(b==="webllm")return callWebLLM({model:settings.webllmModel,...opts});if(b==="manual")return callManual(opts);return callClaude({apiKey:settings.apiKey,model:settings.model,...opts});}
function backendReady(s){const b=s.backend||"manual";if(b==="manual")return true;if(b==="ollama")return !!s.ollamaModel;if(b==="webllm")return hasWebGPU();return !!(s.apiKey&&s.apiKey.length>10);}
function backendLabel(s){const b=s.backend||"manual";if(b==="manual")return "수동/챗GPT 모드";if(b==="ollama")return "로컬 Ollama"+(s.ollamaModel?" · "+s.ollamaModel:"");if(b==="webllm")return "브라우저 내장 AI";return "Anthropic API";}

/* ===== 프롬프트 ===== */
const SYS="당신은 디자인 시스템·핸드오프 전문가입니다. 토큰·컴포넌트·접근성을 정확히 명세하고 개발 친화적으로 정리합니다. 한국어로, JSON 요청 시 순수 JSON만 출력합니다.";
function buildWireframePrompt(goal,content,flow){return `다음 화면의 와이어프레임 구성을 설계하세요(생성형 UI 입력용). 화면 목적: ${goal} / 주요 콘텐츠: ${content||"(미정)"}${flow?" / 흐름: "+flow:""}

영역은 위→아래 화면 순서대로. 모두 한국어.`;}

{ "tokens":{"color":{"--color-...":"#값"},"space":{"--space-...":"값"},"type":{"--font-...":"값"}}, "issues":["중복/예외"], "migration":["우선순위 순서"] }

[인벤토리]

{ "layout":"레이아웃·간격·정렬·반응형 규칙", "tokens":[{"token":"--토큰","usage":"어디에 쓰이나"}], "variants":["variant 설명"], "props":[{"name":"prop","type":"타입","desc":"설명"}], "a11y":["라벨/역할/포커스 등"], "snippet":"간단한 구현 스니펫(JSX 또는 HTML)" }

[컴포넌트]

const BACKENDS=[{id:"webllm",label:"🌐 브라우저 내장 AI",desc:"무료·WebGPU"},{id:"ollama",label:"🖥️ 로컬 Ollama",desc:"무료·내 PC"},{id:"manual",label:"✍️ 수동/챗GPT",desc:"무료·복붙·이미지 가능"},{id:"api",label:"☁️ Anthropic API",desc:"유료·이미지(비전) 지원"}];
function SettingsModal({settings,onSave,onClose}){const[draft,setDraft]=useState({backend:"manual",ollamaUrl:"http://127.0.0.1:11434",ollamaModel:"",webllmModel:WEBLLM_PREFERRED[0],model:MODELS[0].id,apiKey:"",...settings});const[testing,setTesting]=useState(false);const[tr,setTr]=useState(null);const[om,setOm]=useState([]);const[lo,setLo]=useState(false);const[wm,setWm]=useState([]);const[lw,setLw]=useState(false);const refreshO=useCallback(async()=>{setLo(true);setTr(null);try{const l=await ollamaListModels(draft.ollamaUrl);setOm(l);if(l.length&&!l.includes(draft.ollamaModel))setDraft(d=>({...d,ollamaModel:l[0]}));if(!l.length)setTr({ok:false,msg:"모델 없음 → ollama pull qwen2.5:3b"});}catch(e){setTr({ok:false,msg:"연결 실패 — start-ollama.bat"});setOm([]);}finally{setLo(false);}},[draft.ollamaUrl,draft.ollamaModel]);const refreshW=useCallback(async()=>{setLw(true);setTr(null);try{const l=await getWebLLMModels();setWm(l);if(l.length&&!l.includes(draft.webllmModel))setDraft(d=>({...d,webllmModel:WEBLLM_PREFERRED.find(x=>l.includes(x))||l[0]}));}catch(e){setTr({ok:false,msg:"목록 로드 실패"});}finally{setLw(false);}},[draft.webllmModel]);useEffect(()=>{if(draft.backend==="ollama")refreshO();if(draft.backend==="webllm")refreshW();/*eslint-disable-next-line*/},[draft.backend]);const test=async()=>{setTesting(true);setTr(null);try{if(draft.backend==="ollama"){const o=await callOllama({url:draft.ollamaUrl,model:draft.ollamaModel,messages:[{role:"user",content:"OK"}],maxTokens:10});setTr({ok:true,msg:"응답: "+(o||"").slice(0,20)});}else if(draft.backend==="webllm")setTr(hasWebGPU()?{ok:true,msg:"WebGPU ✓"}:{ok:false,msg:"WebGPU 미지원"});else if(draft.backend==="api"){await callClaude({apiKey:draft.apiKey,model:draft.model,maxTokens:16,messages:[{role:"user",content:"ping"}]});setTr({ok:true,msg:"연결 성공!"});}else setTr({ok:true,msg:"수동 모드 바로 사용 가능"});}catch(e){setTr({ok:false,msg:e.message});}finally{setTesting(false);}};return <div className="fixed inset-0 z-[80] flex items-center justify-center bg-ink/40 p-4" onClick={onClose}><Card className="max-h-[90vh] w-full max-w-lg overflow-y-auto p-6 shadow-pop fade-in"><div onClick={e=>e.stopPropagation()}><div className="mb-5 flex items-center justify-between"><h3 className="text-lg font-bold text-ink">설정 · AI 엔진</h3><button className="text-slate-400 hover:text-ink" onClick={onClose}>✕</button></div><div className="space-y-5"><div><div className="mb-2 text-sm font-semibold text-ink">AI 엔진 <span className="font-normal text-slate-400">(무료 우선 · 모든 탭 공유)</span></div><div className="grid grid-cols-2 gap-2">{BACKENDS.map(b=><button key={b.id} onClick={()=>{setDraft(d=>({...d,backend:b.id}));setTr(null);}} className={cx("rounded-xl border p-3 text-left transition",draft.backend===b.id?"border-brand bg-brand-light":"border-hair hover:border-slate-300")}><div className="text-[13px] font-bold text-ink">{b.label}</div></button>)}</div><p className="mt-2 text-[13px] text-slate-400">{(BACKENDS.find(b=>b.id===draft.backend)||{}).desc}</p></div>{draft.backend==="webllm"&&<div className="space-y-3 rounded-xl bg-slate-50 p-4"><div className="text-[13px] font-semibold">{hasWebGPU()?<span className="text-emerald-600">WebGPU ✓</span>:<span className="text-rose-600">WebGPU 미지원</span>}</div><Field label="모델"><div className="flex gap-2"><select value={draft.webllmModel} onChange={e=>setDraft({...draft,webllmModel:e.target.value})} className={cx(inputVisual,"min-w-0 flex-1")}>{(wm.length?wm:[draft.webllmModel]).map(m=><option key={m} value={m}>{m}</option>)}</select><Btn variant="outline" size="sm" onClick={refreshW} disabled={lw}>{lw?<Spinner size={14}/>:"↻"}</Btn></div></Field></div>}{draft.backend==="ollama"&&<div className="space-y-3 rounded-xl bg-slate-50 p-4"><Field label="주소"><input className={inputCls} value={draft.ollamaUrl} onChange={e=>setDraft({...draft,ollamaUrl:e.target.value.trim()})}/></Field><Field label="모델"><div className="flex gap-2"><select value={draft.ollamaModel} onChange={e=>setDraft({...draft,ollamaModel:e.target.value})} className={cx(inputVisual,"min-w-0 flex-1")}>{!om.length&&<option value="">— 없음 —</option>}{om.map(m=><option key={m} value={m}>{m}</option>)}</select><Btn variant="outline" size="sm" onClick={refreshO} disabled={lo}>{lo?<Spinner size={14}/>:"↻"}</Btn></div></Field></div>}{draft.backend==="manual"&&<div className="rounded-xl bg-slate-50 p-4 text-[13px] text-slate-600">코드 스펙에 이미지가 필요하면 챗봇에 이미지를 직접 올린 뒤 프롬프트를 붙여넣으세요.</div>}{draft.backend==="api"&&<div className="space-y-3 rounded-xl bg-slate-50 p-4"><Field label="API 키"><input type="password" className={inputCls} value={draft.apiKey} placeholder="sk-ant-..." onChange={e=>setDraft({...draft,apiKey:e.target.value.trim()})}/></Field><Field label="모델"><select value={draft.model} onChange={e=>setDraft({...draft,model:e.target.value})} className={inputCls}>{MODELS.map(m=><option key={m.id} value={m.id}>{m.label}</option>)}</select></Field></div>}<div className="flex items-center gap-3"><Btn variant="outline" size="sm" onClick={test} disabled={testing}>{testing?<Spinner size={14}/>:"🔌"} 연결 테스트</Btn>{tr&&<span className={cx("text-sm",tr.ok?"text-brand-hover":"text-rose-600")}>{tr.msg}</span>}</div></div><div className="mt-6 flex justify-end gap-2"><Btn variant="ghost" onClick={onClose}>취소</Btn><Btn onClick={()=>onSave(draft)}>저장</Btn></div></div></Card></div>;}

/* ===== ① 와이어프레임 명세 ===== */
function WirePanel({settings,openSettings,toast}){
  const K="uxax_p4a1_v1";const sv=load(K,{});
  const[goal,setGoal]=useState(sv.goal||"");const[content,setContent]=useState(sv.content||"");const[flow,setFlow]=useState(sv.flow||"");const[res,setRes]=useState(sv.res||null);const[busy,setBusy]=useState(false);
  useEffect(()=>{save(K,{goal,content,flow,res})},[goal,content,flow,res]);
  const run=async()=>{if(!goal.trim()){toast("error","화면 목적을 입력하세요");return;}if(!backendReady(settings)){toast("error","AI 엔진을 설정하세요");openSettings();return;}setBusy(true);setRes(null);try{const out=await runLLM(settings,{system:SYS,messages:[{role:"user",content:buildWireframePrompt(goal,content,flow)}],maxTokens:2200,stream:false,meta:{who:"와이어프레임 명세"}});const p=parseJsonLoose(out);setRes(p&&p.regions?p.regions:{raw:out});if(p&&p.regions)setRes(p.regions);toast("ok","명세 완료");}catch(e){toast("error","실패: "+(e.message||e));}finally{setBusy(false);}};
  const regions=Array.isArray(res)?res:null;
  const md=()=>{if(!regions)return res?.raw||"";let m="# 와이어프레임 명세\n**목적:** "+goal+"\n";regions.forEach((r,i)=>{m+=`\n## ${i+1}. ${S(r.name)}\n`;arr(r.components).forEach(c=>m+=`- ${S(c)}\n`);if(arr(r.states).length)m+=`- 상태: ${arr(r.states).map(S).join(", ")}\n`;if(r.note)m+=`- 비고: ${S(r.note)}\n`;});return m;};
  const[confirmed,setConfirmed]=useState(()=>{const s=(window.UXAX&&UXAX.getSlot&&UXAX.getSlot("P5.wire"));return !!(s&&s.meta&&s.meta.human_confirmed);});
  const saveSlot=()=>{if(window.UXAX&&UXAX.setSlot&&regions)UXAX.setSlot("P5.wire",{data:{regions},md:md(),meta:{model:backendLabel(settings),items:regions.length}});};
  return <div className="space-y-6">
    <Guide defaultOpen={!regions}
      what="화면 목적과 콘텐츠를 넣으면 레이아웃 영역(헤더·본문·액션 등)과 영역별 컴포넌트·상태(빈/로딩/에러)를 정의한 와이어프레임 ‘설계 명세’를 만들고, 저-fi 블록 미리보기로 구조를 보여 줍니다."
      where="UX 4단계 ‘디자인(Design)’의 시작. P3 플로우·IA가 정해진 뒤 개별 화면의 뼈대를 잡습니다. 이 명세는 Figma First Draft 등 생성형 UI 입력이나 직접 와이어 작업의 출발점이 됩니다."
      why="고품질 시안을 그리기 전에 ‘무엇이 어디에, 어떤 상태로’ 있어야 하는지 구조를 먼저 합의하면 손이 덜 듭니다. 빈/로딩/에러 상태를 처음부터 챙겨 누락을 줄입니다."
      inputs={[
        {field:"화면 목적", desc:"이 화면이 사용자가 무엇을 하게 하는지(한 가지 핵심 목표).", ex:"상품 상세에서 ‘안전결제로 구매’를 유도"},
        {field:"주요 콘텐츠", desc:"화면에 담을 정보·요소를 나열. 중요도 순으로 적으면 우선순위가 반영됩니다.", ex:"상품 사진, 가격, 판매자 신뢰도, 안전결제 버튼, 배송 옵션"},
        {field:"흐름 맥락 (선택)", desc:"이전/다음 화면. 넣으면 진입·이탈 동선이 명세에 반영됩니다.", ex:"검색결과 → (이 화면) → 결제"},
      ]}
      steps={[
        {t:"목적·콘텐츠 입력",d:"이 화면이 무엇을 하게 하는지, 어떤 정보를 담는지 적습니다."},
        {t:"명세 생성",d:"헤더·본문·액션 등 영역과 영역별 컴포넌트·상태(빈/로딩/에러)를 정의합니다."},
        {t:"검토·활용",d:"저-fi 블록 미리보기로 구조를 확인하고, 생성형 UI 입력/디자인 시작점으로 씁니다. MD로 내보냅니다."},
      ]}
      tips={[
        "이 단계는 ‘설계도’ — 색·폰트 같은 비주얼은 아직 신경 쓰지 말고 구조·우선순위에 집중하세요.",
        "빈/로딩/에러 상태를 처음부터 정의하면 나중에 빠뜨리지 않습니다.",
        "MD로 내보내 Figma First Draft 등 생성형 UI의 입력 프롬프트로 그대로 쓰기 좋습니다.",
      ]}/>
    <Card className="p-6"><div className="mb-3 flex items-center gap-1"><StepHead n={1} title="입력" done={!!regions}/><HelpCue title="와이어프레임 명세" faqs={WIRE_FAQ} settings={settings} openSettings={openSettings} toast={toast}/></div><div className="mb-3"><Btn size="sm" variant="outline" onClick={()=>{setGoal(DEMO_WIRE.goal);setContent(DEMO_WIRE.content);setFlow(DEMO_WIRE.flow);setRes(null);toast("ok","예제 화면 목적·콘텐츠 — ‘와이어 명세 생성’을 눌러보세요");}}>▶ 예제로 해보기</Btn></div>
      <div className="space-y-4"><Field label="화면 목적"><input className={inputCls} value={goal} onChange={e=>setGoal(e.target.value)} placeholder="예: 상품 상세에서 안전결제로 구매 유도"/></Field><Field label="주요 콘텐츠"><textarea className={cx(inputCls,"resize-y")} rows={2} value={content} onChange={e=>setContent(e.target.value)} placeholder="예: 상품 사진, 가격, 판매자 신뢰도, 안전결제 버튼"/></Field><Field label="흐름 맥락 (선택)"><input className={inputCls} value={flow} onChange={e=>setFlow(e.target.value)} placeholder="예: 검색결과 → (이 화면) → 결제"/></Field></div>
      <div className="mt-4"><Btn size="lg" onClick={run} disabled={busy}>{busy?<Spinner size={16}/>:"✨"} 와이어 명세 생성 <span className="font-normal opacity-80">· {backendLabel(settings)}</span></Btn></div>
    </Card>
    {res&&<Card className="p-6 fade-in"><div className="mb-4 flex items-center justify-between"><StepHead n={2} title="화면 구성" done={true}/>{regions&&<div className="flex flex-wrap gap-2"><WsSave title="와이어프레임 명세" getText={md} toast={toast}/><Btn size="sm" variant="outline" onClick={()=>download("wireframe.md",md())}>↧ MD</Btn><Btn size="sm" variant={confirmed?"primary":"outline"} onClick={()=>{const nv=!confirmed;saveSlot();if(window.UXAX&&UXAX.confirmSlot)UXAX.confirmSlot("P5.wire",nv);setConfirmed(nv);toast("ok",nv?"검수 완료로 표시 — 다음 단계에서 ‘사람 확인됨’으로 보여요":"검수 표시를 해제했어요");}}>{confirmed?"✓ 검수 완료":"☐ 내가 검수함"}</Btn></div>}</div>
      {regions?<div className="grid gap-4 lg:grid-cols-2">
        <div><div className="mb-2 text-[12px] font-bold uppercase tracking-wide text-slate-400">저-fi 미리보기</div><div className="mx-auto max-w-[320px] space-y-2 rounded-xl border border-hair bg-slate-50 p-3">{regions.map((r,i)=><div key={i} className="rounded-lg border border-dashed border-slate-300 bg-white p-2.5"><div className="text-[12px] font-bold text-slate-500">{S(r.name)}</div><div className="mt-1 flex flex-wrap gap-1">{arr(r.components).map((c,j)=><span key={j} className="rounded bg-slate-100 px-1.5 py-0.5 text-[11px] text-slate-600">{S(c)}</span>)}</div></div>)}</div></div>
        <div><div className="mb-2 text-[12px] font-bold uppercase tracking-wide text-slate-400">영역 명세</div><div className="space-y-2">{regions.map((r,i)=><Card key={i} className="p-3"><div className="font-bold text-ink">{i+1}. {S(r.name)}</div><div className="mt-1 text-[13px] text-slate-600">컴포넌트: {arr(r.components).map(S).join(", ")}</div>{arr(r.states).length>0&&<div className="mt-0.5 text-[12px] text-amber-700">상태: {arr(r.states).map(S).join(", ")}</div>}{r.note&&<div className="mt-0.5 text-[12px] text-slate-400">{S(r.note)}</div>}</Card>)}</div></div>
      </div>:<pre className="whitespace-pre-wrap rounded-xl bg-slate-50 p-3 text-[13px] text-slate-600">{res.raw}</pre>}
    </Card>}
    {regions&&<div className="flex flex-wrap items-center gap-2 rounded-2xl border border-brand/20 bg-brand-faint p-4 fade-in">
      <span className="text-[14px] font-bold text-ink">✅ 와이어 명세 완성! 다음 단계 →</span>
      <Btn size="sm" onClick={()=>{saveSlot();wsAdd("와이어프레임 명세",md());toast("ok","보관함 저장 — ③ 코드 스펙 탭에서 이어가세요");location.hash="codespec";}}>📤 저장하고 ③ 코드 스펙으로 →</Btn>
      <HelpCue title="와이어 다음은?" faqs={[{q:"와이어 다음은요?",a:"잡은 구조에 토큰(②)을 입히고, ③ 코드 스펙으로 개발에 넘길 명세를 만들어요."}]} settings={settings} openSettings={openSettings} toast={toast}/>
    </div>}
  </div>;

/* ===== ② 디자인 토큰 ===== */
function TokenPanel({settings,openSettings,toast}){
  const K="uxax_p4a2_v1";const sv=load(K,{});
  const[inv,setInv]=useState(sv.inv||"");const[res,setRes]=useState(sv.res||null);const[busy,setBusy]=useState(false);
  useEffect(()=>{save(K,{inv,res})},[inv,res]);
  const run=async()=>{if(!inv.trim()){toast("error","스타일 인벤토리를 입력하세요");return;}if(!backendReady(settings)){toast("error","AI 엔진을 설정하세요");openSettings();return;}setBusy(true);setRes(null);try{const out=await runLLM(settings,{system:SYS,messages:[{role:"user",content:buildTokenPrompt(inv)}],maxTokens:2400,stream:false,meta:{who:"디자인 토큰"}});const p=parseJsonLoose(out);setRes(p&&typeof p==="object"?p:{raw:out});toast("ok","토큰 정리 완료");}catch(e){toast("error","실패: "+(e.message||e));}finally{setBusy(false);}};
  const tokensToCss=()=>{if(!res||!res.tokens)return "";let css=":root{\n";["color","space","type"].forEach(k=>{const o=res.tokens[k]||{};if(Object.keys(o).length)css+=`  /* ${k} */\n`;Object.entries(o).forEach(([t,v])=>{css+=`  ${t.startsWith("--")?t:"--"+t}: ${v};\n`;});});css+="}";return css;};
  const[confirmed,setConfirmed]=useState(()=>{const s=(window.UXAX&&UXAX.getSlot&&UXAX.getSlot("P5.token"));return !!(s&&s.meta&&s.meta.human_confirmed);});
  const saveSlot=()=>{if(window.UXAX&&UXAX.setSlot&&res&&res.tokens)UXAX.setSlot("P5.token",{data:{tokens:res.tokens},md:tokensToCss(),meta:{model:backendLabel(settings)}});};
  return <div className="space-y-6">
    <Guide defaultOpen={!res}

      what="변경 이력(git log·커밋·이슈·디자인 변경 메모)을 넣으면 Added/Changed/Fixed/Removed로 분류하고, 사용자 영향이 큰 항목을 위로 올린 평이한 릴리즈 노트(체인지로그)를 만들어 주는 도구입니다."
      where="UX 6단계 ‘핸드오프·개선(Handoff & Iterate)’. 릴리즈/배포 시점에 ‘무엇이 바뀌었는지’를 이해관계자·사용자에게 전달할 때 씁니다. 핸드오프 문서와 함께 나갑니다."
      why="개발 커밋 로그는 기술 용어투성이라 PM·디자이너·사용자가 이해하기 어렵습니다. 분류·평이화하면 누가 봐도 이해할 수 있는 변경 안내가 되고, 마이그레이션 주의사항을 놓치지 않습니다."
      inputs={[
        {field:"변경 이력", desc:"커밋 메시지·이슈 제목·변경 메모를 그대로 붙여넣기(형식 섞여도 됨).", ex:"feat: 안전결제 기본 노출 / fix: 채팅 알림 누락 수정 / 디자인: 신뢰 배지 추가"},
      ]}
      steps={[
        {t:"변경 이력 붙여넣기",d:"커밋/이슈/변경 메모를 그대로 붙여넣습니다."},
        {t:"생성 실행",d:"Added/Changed/Fixed/Removed로 분류하고 사용자 영향 큰 항목을 우선 정리합니다."},
        {t:"검토·내보내기",d:"마이그레이션·주의사항을 확인하고 MD 릴리즈 노트로 내보냅니다."},
      ]}
      tips={[
        "사용자 공지용과 개발 내부용은 톤이 다릅니다 — 필요하면 둘로 나눠 정리하세요.",
        "‘주의사항·마이그레이션’은 배포 사고를 막는 핵심 — 비워두지 말고 확인하세요.",
        "버전 태그(예: v1.4.0)·날짜를 앞에 붙이면 그대로 릴리즈 노트로 게시 가능합니다.",
      ]}/>
    <Card className="p-6"><div className="mb-3 flex items-center gap-1"><StepHead n={1} title="변경 이력" done={!!res}/><HelpCue title="체인지로그·릴리즈노트" faqs={CHANGELOG_FAQ} settings={settings} openSettings={openSettings} toast={toast}/></div><div className="mb-3"><Btn size="sm" variant="outline" onClick={()=>{setChanges(DEMO_CHANGELOG);setRes(null);toast("ok","예제 변경 이력 — ‘릴리즈 노트 생성’을 눌러보세요");}}>▶ 예제로 해보기</Btn></div>
      <WsPull onPick={t=>setChanges(changes?changes+"\n"+t:t)} label="📥 보관함에서 가져오기 (변경 이력 등)"/>
      <textarea className={cx(inputCls,"resize-y")} rows={7} value={changes} onChange={e=>setChanges(e.target.value)} placeholder={"feat: 안전결제 기본 노출\nfix: 채팅 알림 누락 수정\n디자인: 신뢰 배지 추가\nrefactor: 결제 모듈 정리 ..."}/>
      <div className="mt-4"><Btn size="lg" onClick={run} disabled={busy}>{busy?<Spinner size={16}/>:"✨"} 릴리즈 노트 생성 <span className="font-normal opacity-80">· {backendLabel(settings)}</span></Btn></div>
    </Card>
    {res&&<Card className="p-6 fade-in"><div className="mb-4 flex items-center justify-between"><StepHead n={2} title="릴리즈 노트" done={true}/>{!res.raw&&<div className="flex flex-wrap gap-2"><WsSave title="릴리즈 노트" getText={md} toast={toast}/><Btn size="sm" variant="outline" onClick={()=>download("changelog.md",md())}>↧ MD</Btn><Btn size="sm" variant={confirmed?"primary":"outline"} onClick={()=>{const nv=!confirmed;saveSlot();if(window.UXAX&&UXAX.confirmSlot)UXAX.confirmSlot("P5.changelog",nv);setConfirmed(nv);toast("ok",nv?"검수 완료로 표시 — 다음 단계에서 ‘사람 확인됨’으로 보여요":"검수 표시를 해제했어요");}}>{confirmed?"✓ 검수 완료":"☐ 내가 검수함"}</Btn></div>}</div>
      {res.raw?<pre className="whitespace-pre-wrap rounded-xl bg-slate-50 p-3 text-[13px] text-slate-600">{res.raw}</pre>:<div className="space-y-4"><Sec t="✨ Added" items={res.added} color="text-emerald-600"/><Sec t="🔧 Changed" items={res.changed} color="text-brand-hover"/><Sec t="🐞 Fixed" items={res.fixed} color="text-amber-600"/><Sec t="🗑 Removed" items={res.removed} color="text-rose-600"/>{res.notes&&<div className="rounded-xl bg-amber-50 p-3"><div className="mb-1 text-[12px] font-bold uppercase tracking-wide text-amber-700">주의사항·마이그레이션</div><p className="text-[13px] text-amber-800">{S(res.notes)}</p></div>}</div>}
    </Card>}
    {res&&<div className="flex flex-wrap items-center gap-2 rounded-2xl border border-brand/20 bg-brand-faint p-4 fade-in">
      <span className="text-[14px] font-bold text-ink">✅ 릴리즈 노트 완성! 다음 단계 →</span>
      <Btn size="sm" onClick={()=>{saveSlot();wsAdd("릴리즈 노트",md());toast("ok","보관함 저장 — P7 운영에서 📥 가져오기로 이어가세요");location.href="./P7_피드백운영스튜디오.html#ops";}}>📤 저장하고 P7 운영으로 →</Btn>
      <HelpCue title="릴리즈 다음은?" faqs={[{q:"릴리즈 노트 다음은요?",a:"배포 후 P7에서 사용자 피드백·운영 지표를 모아 다음 개선으로 순환해요."}]} settings={settings} openSettings={openSettings} toast={toast}/>
    </div>}
  </div>;
}

/* ===== Root ===== */
const TABS=[{id:"wire",label:"① 와이어프레임",pid:"P4-A1"},{id:"token",label:"② 디자인 토큰",pid:"P4-A2"},{id:"codespec",label:"③ 코드 스펙",pid:"P6-A1"},{id:"changelog",label:"④ 체인지로그",pid:"P6-A2"}];
/* 판단 게이트 — "이 단계 시작·마무리해도 되나" 6칸 자가점검(초급자 판단 학습). dossier.gates[phase]에 저장 */
function GatePanel({phase}){
  const[open,setOpen]=useState(false);const[,force]=useState(0);
  const g=(window.UXAX&&UXAX.getGate&&UXAX.getGate(phase))||{};
  const auto=(window.UXAX&&UXAX.deriveGate&&UXAX.deriveGate(phase))||{};
  const fields=(window.UXAX&&UXAX.GATE_FIELDS)||[];
  const brief=(window.UXAX&&UXAX.getBrief&&UXAX.getBrief())||{};
  // P0 정의 → 게이트 연결: 목표는 P0 '한 줄 정의', 합격선은 P0 '성공 기준'에서 가져올 수 있게(프리필).
  const PREFILL={goal:{src:(brief.oneline||"").trim(),label:"P0 한 줄 정의 가져오기"},passLine:{src:(brief.success||"").trim(),label:"P0 성공 기준 가져오기"}};
  const hasBrief=!!((brief.oneline||"").trim()||(brief.success||"").trim());
  const val=(k)=>g[k]||"";const autoOf=(k)=>auto[k];
  const setVal=(k,v)=>{if(window.UXAX&&UXAX.setGate)UXAX.setGate(phase,{[k]:v});force(n=>n+1);};
  const sat=fields.filter(f=>f.kind==="auto"?(autoOf(f.key)&&autoOf(f.key).ok):!!String(val(f.key)).trim()).length;
  const allOk=fields.length>0&&sat===fields.length;const confirmed=!!g.confirmed;
  return <div className="mb-5 rounded-2xl border border-hair bg-white shadow-soft">
    <button onClick={()=>setOpen(o=>!o)} className="flex w-full items-center gap-3 px-4 py-3 text-left">
      <span className="text-lg">🚦</span>
      <div className="min-w-0 flex-1">
        <div className="flex flex-wrap items-center gap-2 text-[15px] font-bold text-ink">단계 점검 · 판단 게이트<Chip className={allOk?"bg-emerald-50 text-emerald-600 ring-emerald-100":"bg-amber-50 text-amber-600 ring-amber-100"}>{allOk?"준비 완료":"점검 "+sat+"/"+fields.length}</Chip>{confirmed&&<Chip className="bg-brand-light text-brand-hover ring-brand/20">✓ 마무리 점검됨</Chip>}</div>
        <div className="text-[12.5px] text-slate-400">이 단계를 <b>시작·마무리해도 되는지</b> 6칸으로 스스로 점검 — “무엇을 어디까지” 판단하는 법을 배워요.</div>
      </div>
      <span className="shrink-0 text-[13px] text-slate-400">{open?"접기 ▲":"펼치기 ▼"}</span>
    </button>
    {open&&<div className="border-t border-hair p-4">
      {hasBrief
        ? <div className="mb-3 rounded-xl border border-brand/20 bg-brand-faint p-3">
            <div className="flex flex-wrap items-center gap-1.5 text-[12.5px] font-bold text-brand-hover">🧭 이 프로젝트의 북극성<span className="font-normal text-slate-400">— 프로젝트 정의(P0)에서 정함</span></div>
            {(brief.oneline||"").trim()&&<div className="mt-1 text-[12.5px] leading-relaxed text-slate-600"><b className="text-ink">한 줄 정의</b> · {brief.oneline}</div>}
            {(brief.success||"").trim()&&<div className="mt-0.5 text-[12.5px] leading-relaxed text-slate-600"><b className="text-ink">성공 기준</b> · {brief.success}</div>}
            <div className="mt-1.5 text-[11.5px] leading-relaxed text-slate-400">리서치하며 생각이 바뀌면 <a href="./index.html" className="font-semibold text-brand-hover hover:underline">홈에서 정의를 고치세요 →</a> 정의는 고정이 아니라 같이 자라요.</div>
          </div>
        : <div className="mb-3 rounded-xl border border-amber-100 bg-amber-50/50 p-3 text-[12.5px] leading-relaxed text-amber-700">아직 <b>프로젝트 정의(P0)</b>가 비어 있어요 — <a href="./index.html" className="font-semibold underline">홈에서 먼저 정하면</a> 이 단계의 목표·합격선이 또렷해져요.</div>}
      <div className="grid gap-2.5 sm:grid-cols-2">
        {fields.map(f=>{const a=autoOf(f.key);const pf=PREFILL[f.key];const empty=!String(val(f.key)).trim();return <div key={f.key} className={cx("rounded-xl border p-3",f.kind==="auto"?(a&&a.ok?"border-emerald-100 bg-emerald-50/40":"border-amber-100 bg-amber-50/40"):"border-hair bg-white")}>
          <div className="flex items-center gap-1.5 text-[13px] font-bold text-ink"><span>{f.icon}</span><span>{f.label}</span>{f.kind==="auto"&&<span className={cx("ml-auto text-[12px] font-bold",a&&a.ok?"text-emerald-600":"text-amber-600")}>{a&&a.ok?"✓ 충족":"⚠ 확인"}</span>}</div>
          <div className="mt-0.5 text-[12px] leading-relaxed text-slate-500">{f.help}</div>
          {f.kind==="auto"?<div className={cx("mt-1.5 text-[12.5px] font-medium",a&&a.ok?"text-emerald-700":"text-amber-700")}>{a?a.why:""}</div>:<div className="mt-1.5"><textarea value={val(f.key)} onChange={e=>setVal(f.key,e.target.value)} placeholder={f.ph} rows={2} className={cx(inputCls,"resize-y text-[13px]")}/>{pf&&pf.src&&empty&&<button type="button" onClick={()=>setVal(f.key,pf.src)} className="mt-1 text-[11.5px] font-semibold text-brand-hover hover:underline">↧ {pf.label}</button>}</div>}
        </div>;})}
      </div>
      <div className="mt-3 flex flex-wrap items-center justify-between gap-2">
        <div className="text-[12.5px] text-slate-500">{allOk?"6칸 모두 충족 — 자신 있게 진행하거나 다음 단계로 넘어가도 좋아요.":"빈 칸·⚠ 항목을 채우면 더 단단해져요. (강제는 아니에요 — 판단을 돕는 체크리스트)"}</div>
        <Btn size="sm" variant={confirmed?"ghost":"soft"} onClick={()=>{if(window.UXAX&&UXAX.setGate)UXAX.setGate(phase,{confirmed:!confirmed});force(n=>n+1);}}>{confirmed?"✓ 마무리 점검 해제":"이 단계 마무리 점검 통과로 표시"}</Btn>
      </div>
    </div>}
  </div>;
}
/* 하단 단계 네비 — 같은 단계 안 탭 이동(이전/다음) + 이전 단계 돌아가기 + 다음 단계로 진행 */
function StageNav({tab,setTab}){
  const i=TABS.findIndex(t=>t.id===tab);const prevTab=TABS[i-1],nextTab=TABS[i+1];
  const pi=PROCESS.findIndex(p=>p.id===CURRENT_PHASE);const prevPhase=PROCESS[pi-1],nextPhase=PROCESS[pi+1];const curName=(PROCESS[pi]||{}).name||"";
  return <nav className="no-print mx-auto mt-10 mb-36 max-w-[1100px] px-5">
    <div className="rounded-2xl border border-hair bg-white p-4 shadow-soft">
      <div className="mb-3 flex items-center justify-between gap-2">
        <button onClick={()=>prevTab&&setTab(prevTab.id)} disabled={!prevTab} className={cx("inline-flex min-w-0 items-center gap-1.5 rounded-[10px] border border-hair px-3 py-2 text-[13px] font-semibold transition",prevTab?"text-slate-600 hover:bg-slate-50":"cursor-default opacity-40")}>← <span className="truncate">{prevTab?prevTab.label:"이 단계 처음"}</span></button>
        <div className="shrink-0 text-center text-[12px] text-slate-400">{CURRENT_PHASE} {curName} 안에서 <b className="text-brand-hover">{i+1} / {TABS.length}</b></div>
        <button onClick={()=>nextTab&&setTab(nextTab.id)} disabled={!nextTab} className={cx("inline-flex min-w-0 items-center gap-1.5 rounded-[10px] border border-hair px-3 py-2 text-[13px] font-semibold transition",nextTab?"text-slate-600 hover:bg-slate-50":"cursor-default opacity-40")}><span className="truncate">{nextTab?nextTab.label:"이 단계 마지막"}</span> →</button>
      </div>
      <div className="flex flex-wrap items-center justify-between gap-2 border-t border-hair pt-3">
        <a href={prevPhase?("./"+prevPhase.file):"./index.html"} className="inline-flex items-center gap-1.5 rounded-[10px] px-3 py-2 text-[13px] font-semibold text-slate-500 hover:bg-slate-100">↩ {prevPhase?(prevPhase.id+" "+prevPhase.name+"로 돌아가기"):"홈 · 프로젝트 정의(P0)"}</a>
        {nextPhase&&<a href={"./"+nextPhase.file} className="inline-flex items-center gap-2 rounded-[10px] bg-brand px-4 py-2.5 text-[13px] font-bold text-white shadow-sm hover:bg-brand-hover" title="이 단계를 마쳤다면 다음 단계로">다음 단계 → {nextPhase.id} {nextPhase.name}</a>}
      </div>
    </div>
  </nav>;
}
function App(){
  const[settings,setSettings]=useState(()=>{const s=load(SETTINGS_KEY,null);const fc=(window.UXAX_CONFIG&&window.UXAX_CONFIG.anthropicApiKey)||"";const def={backend:fc?"api":"manual",apiKey:fc,model:MODELS[0].id,ollamaUrl:"http://127.0.0.1:11434",ollamaModel:"",webllmModel:WEBLLM_PREFERRED[0]};return s?{...def,...s}:def;});
  const[tab,setTab]=useState(()=>{const h=(location.hash||"").replace("#","");return TABS.find(t=>t.id===h)?h:"wire";});
  const[showSettings,setShowSettings]=useState(false);const[toast,setToastState]=useState(null);const[,force]=useState(0);
  const ready=backendReady(settings);
  useEffect(()=>{save(SETTINGS_KEY,settings)},[settings]);useEffect(()=>{location.hash=tab},[tab]);useEffect(()=>{const h=()=>{const x=(location.hash||"").replace("#","");if(TABS.find(t=>t.id===x))setTab(x);};window.addEventListener("hashchange",h);return()=>window.removeEventListener("hashchange",h);},[]);
  useEffect(()=>{const f=()=>force(n=>n+1);manualBridge.notify=f;webllmLoader.notify=f;return()=>{manualBridge.notify=null;webllmLoader.notify=null;};},[]);
  const toastFn=useCallback((t,m)=>{setToastState({type:t,msg:m});setTimeout(()=>setToastState(null),3400)},[]);
  useEffect(()=>{if(settings.backendChosen||settings.backend!=="manual")return;(async()=>{try{const l=await ollamaListModels(settings.ollamaUrl,1500);if(l.length){setSettings(s=>({...s,backend:"ollama",ollamaModel:l[0]}));toastFn("ok","로컬 Ollama 자동 연결");}}catch(e){}})();/*eslint-disable-next-line*/},[]);
  const openSettings=()=>setShowSettings(true);
  return <div className="min-h-screen">
    <header className="sticky top-0 z-40 border-b border-hair bg-canvas/85 backdrop-blur-md">
      <div className="mx-auto flex max-w-[1100px] items-center gap-3 px-5 py-3"><a href="./index.html" className="rounded-[10px] px-2 py-1.5 text-sm text-slate-500 hover:bg-slate-100">← 홈</a><div className="flex items-center gap-2.5"><div className="flex h-9 w-9 items-center justify-center rounded-[10px] bg-brand text-base font-black text-white">⌘</div><div><div className="text-[16px] font-extrabold leading-none tracking-tight text-ink">디자인·핸드오프 스튜디오</div><div className="text-[11px] text-slate-400">와이어·토큰·코드스펙·체인지로그 · 무료</div></div></div><div className="flex-1"/><button onClick={openSettings} className={cx("hidden items-center gap-1.5 rounded-full px-3 py-1.5 text-[13px] font-semibold ring-1 ring-inset sm:inline-flex",ready?"bg-emerald-50 text-emerald-600 ring-emerald-100":"bg-amber-50 text-amber-600 ring-amber-100")}><span className={cx("h-1.5 w-1.5 rounded-full",ready?"bg-emerald-500":"bg-amber-500")}/>{backendLabel(settings)}</button><button onClick={openSettings} className="rounded-[10px] p-2 text-slate-500 hover:bg-slate-100" title="설정">⚙</button></div>
      <ProcessNav current={CURRENT_PHASE}/>
      <div className="mx-auto max-w-[1100px] overflow-x-auto px-3"><nav className="flex gap-1">{TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} className={cx("flex items-center gap-1.5 whitespace-nowrap border-b-2 px-4 py-2.5 text-sm font-semibold transition",tab===t.id?"border-brand text-brand-hover":"border-transparent text-slate-500 hover:text-ink")}>{t.label}<span className="text-[11px] text-slate-400">{t.pid}</span></button>)}</nav></div>
    </header>
    <main className="mx-auto max-w-[1100px] px-5 py-7">
      <GatePanel phase={CURRENT_PHASE}/>
      <div className={tab==="wire"?"":"hidden"}><WirePanel settings={settings} openSettings={openSettings} toast={toastFn}/></div>
      <div className={tab==="token"?"":"hidden"}><TokenPanel settings={settings} openSettings={openSettings} toast={toastFn}/></div>
      <div className={tab==="codespec"?"":"hidden"}><CodeSpecPanel settings={settings} openSettings={openSettings} toast={toastFn}/></div>
      <div className={tab==="changelog"?"":"hidden"}><ChangelogPanel settings={settings} openSettings={openSettings} toast={toastFn}/></div>
    </main>
    <StageNav tab={tab} setTab={setTab}/>
    {showSettings&&<SettingsModal settings={settings} onSave={(s)=>{setSettings({...s,backendChosen:true});setShowSettings(false);toastFn("ok","설정 저장됨");}} onClose={()=>setShowSettings(false)}/>}
    <ManualModal req={manualBridge.current()} queueCount={manualBridge.count()} onSubmit={(t)=>manualBridge.resolveCurrent(t)} onCancel={()=>manualBridge.rejectCurrent()}/>
    <ProgressOverlay state={webllmLoader} title="브라우저 내장 AI 준비 중" emoji="🌐"/>
    <WorkspaceFab toast={toastFn}/>
    <Toast toast={toast}/>
  </div>;
}
window.addEventListener("error",(e)=>{const root=document.getElementById("root");if(root&&(!root.firstElementChild||root.dataset.errored)){if(root.dataset.errored)return;root.dataset.errored="1";root.innerHTML='<div style="padding:24px;font-family:Pretendard,system-ui,sans-serif;color:#b91c1c"><h2 style="font-weight:700;margin-bottom:8px">초기화 오류</h2><pre style="white-space:pre-wrap;color:#54576a">'+(e.message||e.error||"알 수 없는 오류")+'</pre></div>';}});
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
