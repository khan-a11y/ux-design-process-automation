const API_URL="https://api.anthropic.com/v1/messages";
async function callClaude({apiKey,model,system,messages,maxTokens=4096,stream=false,onDelta,signal}){if(!apiKey){const e=new Error("API 키가 없습니다");e.code="NO_KEY";throw e;}const body={model,max_tokens:maxTokens,messages};if(system)body.system=system;if(stream)body.stream=true;const res=await fetch(API_URL,{method:"POST",headers:{"content-type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body),signal});if(!res.ok){let d="";try{const j=await res.json();d=j.error?.message||JSON.stringify(j)}catch(e){try{d=await res.text()}catch(e2){}}const err=new Error("API "+res.status+(d?" · "+d:""));err.status=res.status;throw err;}if(!stream){const data=await res.json();return (data.content||[]).map(b=>b.text||"").join("");}const rd=res.body.getReader();const dec=new TextDecoder();let buf="",full="";while(true){const{done,value}=await rd.read();if(done)break;buf+=dec.decode(value,{stream:true});let i;while((i=buf.indexOf("\n\n"))>=0){const blk=buf.slice(0,i);buf=buf.slice(i+2);const ln=blk.split("\n").find(l=>l.startsWith("data:"));if(!ln)continue;const p=ln.slice(5).trim();if(!p||p==="[DONE]")continue;try{const evt=JSON.parse(p);if(evt.type==="content_block_delta"&&evt.delta?.type==="text_delta"){full+=evt.delta.text;onDelta&&onDelta(full,evt.delta.text);}}catch(e){}}}return full;}
async function ollamaListModels(url,timeoutMs=3000){const base=(url||"http://127.0.0.1:11434").replace(/\/$/,"");const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),timeoutMs);try{const res=await fetch(base+"/api/tags",{signal:ctrl.signal});if(!res.ok)throw new Error("Ollama "+res.status);const d=await res.json();return (d.models||[]).map(m=>m.name);}finally{clearTimeout(t);}}
async function callOllama({url,model,system,messages,maxTokens=2000,stream=false,onDelta,signal}){const base=(url||"http://127.0.0.1:11434").replace(/\/$/,"");const msgs=[];if(system)msgs.push({role:"system",content:system});for(const m of messages)msgs.push({role:m.role,content:m.content});const res=await fetch(base+"/api/chat",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({model,messages:msgs,stream:!!stream,options:{num_predict:maxTokens,num_ctx:8192}}),signal});if(!res.ok){let d="";try{d=(await res.json()).error||""}catch(e){}throw new Error("Ollama "+res.status+(d?" · "+d:""));}if(!stream){const data=await res.json();return (data.message&&data.message.content)||"";}const rd=res.body.getReader();const dec=new TextDecoder();let buf="",full="";while(true){const{done,value}=await rd.read();if(done)break;buf+=dec.decode(value,{stream:true});let nl;while((nl=buf.indexOf("\n"))>=0){const ln=buf.slice(0,nl).trim();buf=buf.slice(nl+1);if(!ln)continue;try{const evt=JSON.parse(ln);if(evt.message?.content){full+=evt.message.content;onDelta&&onDelta(full,evt.message.content);}}catch(e){}}}return full;}
const WEBLLM_PREFERRED=["Qwen2.5-3B-Instruct-q4f16_1-MLC","Qwen2.5-7B-Instruct-q4f16_1-MLC","Llama-3.2-3B-Instruct-q4f16_1-MLC"];
const webllmState={lib:null,engine:null,modelId:null};const webllmLoader={active:false,progress:0,text:"",notify:null,set(a,p,t){this.active=a;this.progress=p;this.text=t;this.notify&&this.notify();}};

async function ensureWebLLM(modelId){if(!hasWebGPU())throw new Error("WebGPU 미지원");if(webllmState.engine&&webllmState.modelId===modelId)return webllmState.engine;const w=await loadWebLLMLib();const ids=(w.prebuiltAppConfig?.model_list||[]).map(m=>m.model_id);let id=modelId;if(!ids.includes(id))id=WEBLLM_PREFERRED.find(x=>ids.includes(x))||ids[0];if(webllmState.engine){try{await webllmState.engine.unload()}catch(e){}webllmState.engine=null;}webllmLoader.set(true,0,"브라우저 AI 준비 중…");let le=null;try{for(let a=1;a<=4;a++){try{webllmState.engine=await w.CreateMLCEngine(id,{initProgressCallback:(r)=>webllmLoader.set(true,r.progress||0,(a>1?"(재시도 "+a+") ":"")+(r.text||""))},{context_window_size:8192});webllmState.modelId=id;le=null;break;}catch(e){le=e;await new Promise(r=>setTimeout(r,1500));}}}finally{webllmLoader.set(false,1,"");}if(le)throw new Error("브라우저 AI 다운로드 실패");return webllmState.engine;}

const EMB_MODEL="Xenova/paraphrase-multilingual-MiniLM-L12-v2";
const embState={extractor:null};const embLoader={active:false,progress:0,text:"",notify:null,set(a,p,t){this.active=a;this.progress=p;this.text=t;this.notify&&this.notify();}};
async function loadTransformers(){const lib=await import("https://esm.run/@huggingface/transformers@3.3.3");lib.env.allowLocalModels=false;lib.env.useBrowserCache=true;return lib;}
async function ensureExtractor(){if(embState.extractor)return embState.extractor;const lib=await loadTransformers();const device=hasWebGPU()?"webgpu":"wasm";embLoader.set(true,0,"임베딩 모델 다운로드 중… (최초 1회)");try{embState.extractor=await lib.pipeline("feature-extraction",EMB_MODEL,{device,progress_callback:(p)=>{if(p&&p.status==="progress"){const pct=p.total?p.loaded/p.total:0;embLoader.set(true,pct,(p.file||"")+" "+Math.round(pct*100)+"%");}else if(p&&p.status)embLoader.set(true,embLoader.progress,p.status);}});}catch(e){try{embState.extractor=await lib.pipeline("feature-extraction","Xenova/all-MiniLM-L6-v2",{device});}catch(e2){embLoader.set(false,1,"");throw new Error("임베딩 모델 로드 실패: "+(e.message||e));}}finally{embLoader.set(false,1,"");}return embState.extractor;}
async function embedTexts(texts,onProg){const ex=await ensureExtractor();const vecs=[];const B=24;for(let i=0;i<texts.length;i+=B){const batch=texts.slice(i,i+B);const out=await ex(batch,{pooling:"mean",normalize:true});const list=out.tolist?out.tolist():out;for(const v of list)vecs.push(Float32Array.from(v));onProg&&onProg(Math.min(1,(i+B)/texts.length));}return vecs;}
function kmeans(vectors,k,iters=30){const n=vectors.length;if(!n)return{assign:[]};const d=vectors[0].length;k=Math.max(1,Math.min(k,n));const idx=[...Array(n).keys()];for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}let cent=idx.slice(0,k).map(i=>Array.from(vectors[i]));let assign=new Array(n).fill(0);for(let it=0;it<iters;it++){let changed=false;for(let i=0;i<n;i++){let best=0,bd=Infinity;const v=vectors[i];for(let c=0;c<k;c++){let s=0;const cc=cent[c];for(let j=0;j<d;j++){const x=v[j]-cc[j];s+=x*x;}if(s<bd){bd=s;best=c;}}if(assign[i]!==best){assign[i]=best;changed=true;}}const sums=Array.from({length:k},()=>new Float64Array(d));const cnt=new Array(k).fill(0);for(let i=0;i<n;i++){const c=assign[i];cnt[c]++;const v=vectors[i];const su=sums[c];for(let j=0;j<d;j++)su[j]+=v[j];}for(let c=0;c<k;c++){if(!cnt[c]){cent[c]=Array.from(vectors[Math.floor(Math.random()*n)]);continue;}for(let j=0;j<d;j++)cent[c][j]=sums[c][j]/cnt[c];}if(!changed&&it>0)break;}return{assign};}

/* ===== ③ HMW ===== */
function HmwPanel({settings,openSettings,toast}){
  const K="uxax_p2a4_v1";const sv=load(K,{});
  const[insightsText,setInsightsText]=useState(sv.insightsText!=null?sv.insightsText:(sv.insights||[]).join("\n"));const insights=insightsText.split(/\n/).map(s=>s.trim()).filter(Boolean);const[items,setItems]=useState(sv.items||null);const[busy,setBusy]=useState(false);
  useEffect(()=>{save(K,{insightsText,items})},[insightsText,items]);
  const run=async()=>{if(!insights.length){toast("error","인사이트를 입력하세요");return;}if(!backendReady(settings)){toast("error","AI 엔진을 설정하세요");openSettings();return;}setBusy(true);setItems(null);try{const out=await runLLM(settings,{system:SYS,messages:[{role:"user",content:buildHmwPrompt(insights)}],maxTokens:2200,stream:false,meta:{who:"HMW 변환"}});const p=parseJsonLoose(out);setItems((p&&p.items)||null);if(!(p&&p.items))toast("info","파싱 실패");else toast("ok","HMW 완료");}catch(e){toast("error","실패: "+(e.message||e));}finally{setBusy(false);}};

function PrdPanel({settings,openSettings,toast}){

  const PChip=({p})=>{const m={Must:"bg-rose-50 text-rose-600 ring-rose-100",Should:"bg-amber-50 text-amber-600 ring-amber-100",Could:"bg-slate-100 text-slate-500 ring-slate-200/60"};return <Chip className={m[p]||"bg-slate-100 text-slate-500"}>{p}</Chip>;};
  const[confirmed,setConfirmed]=useState(()=>{const s=(window.UXAX&&UXAX.getSlot&&UXAX.getSlot("P2.prd"));return !!(s&&s.meta&&s.meta.human_confirmed);});
  const saveSlot=()=>{if(window.UXAX&&UXAX.setSlot&&prd)UXAX.setSlot("P2.prd",{data:{prd,problem,goals},md:prdMd(),meta:{model:backendLabel(settings),items:arr(prd.requirements).length}});};

      where="UX 2단계 ‘정의’의 산출물이자 디자인·개발로 넘기는 다리. 무엇을 만들지 팀이 합의하는 기준 문서로, 이후 P3 우선순위·P4 디자인·P6 핸드오프의 기준이 됩니다."
      why="디자이너·PM·개발자가 ‘무엇을 왜 만드는지’ 같은 문서를 보게 해 정렬을 맞춥니다. 수용 기준(AC)이 있으면 ‘완료의 정의’가 명확해져 개발·QA가 수월해집니다."
      inputs={[
        {field:"해결할 문제", desc:"정의 단계에서 좁힌 문제. POV/HMW·여정맵 결과를 근거로 쓰면 좋습니다.", ex:"신규 사용자의 첫 거래 전환율이 낮음(신뢰·안전 불안 때문)"},
        {field:"목표", desc:"이 제품/기능으로 달성하려는 것. 가능하면 측정 가능하게.", ex:"첫 거래 전환율을 분기 내 +15%"},
        {field:"제약조건 (선택)", desc:"기간·기술·정책 제약. 넣으면 우선순위(Must/Should/Could)가 현실적으로 잡힙니다.", ex:"2주 스프린트, 외부 결제 연동 불가"},
      ]}
      steps={[
        {t:"문제·목표 입력",d:"무엇을 왜 해결하려는지 적습니다."},

  const ready=backendReady(settings);

  useEffect(()=>{const f=()=>force(n=>n+1);manualBridge.notify=f;webllmLoader.notify=f;embLoader.notify=f;return()=>{manualBridge.notify=null;webllmLoader.notify=null;embLoader.notify=null;};},[]);
  const toastFn=useCallback((t,m)=>{setToastState({type:t,msg:m});setTimeout(()=>setToastState(null),3400)},[]);
  useEffect(()=>{if(settings.backendChosen||settings.backend!=="manual")return;(async()=>{try{const l=await ollamaListModels(settings.ollamaUrl,1500);if(l.length){setSettings(s=>({...s,backend:"ollama",ollamaModel:l[0]}));toastFn("ok","로컬 Ollama 자동 연결");}}catch(e){}})();/*eslint-disable-next-line*/},[]);
  const openSettings=()=>setShowSettings(true);
  return <div className="min-h-screen">
    <header className="sticky top-0 z-40 border-b border-hair bg-canvas/85 backdrop-blur-md">
      <div className="mx-auto flex max-w-[1100px] items-center gap-3 px-5 py-3"><a href="./index.html" className="rounded-[10px] px-2 py-1.5 text-sm text-slate-500 hover:bg-slate-100">← 홈</a><div className="flex items-center gap-2.5"><div className="flex h-9 w-9 items-center justify-center rounded-[10px] bg-brand text-sm font-black text-white">P2</div><div><div className="text-[16px] font-extrabold leading-none tracking-tight text-ink">정의 스튜디오</div><div className="text-[11px] text-slate-400">어피니티·여정맵·HMW·PRD · 무료</div></div></div><div className="flex-1"/><a href={PERSONA_URL} target="_blank" className="hidden rounded-[10px] px-3 py-1.5 text-[13px] font-semibold text-brand-hover hover:bg-brand-light sm:block">🎭 페르소나는 퍼소나 스튜디오 ↗</a><button onClick={openSettings} className={cx("hidden items-center gap-1.5 rounded-full px-3 py-1.5 text-[13px] font-semibold ring-1 ring-inset sm:inline-flex",ready?"bg-emerald-50 text-emerald-600 ring-emerald-100":"bg-amber-50 text-amber-600 ring-amber-100")}><span className={cx("h-1.5 w-1.5 rounded-full",ready?"bg-emerald-500":"bg-amber-500")}/>{backendLabel(settings)}</button><button onClick={openSettings} className="rounded-[10px] p-2 text-slate-500 hover:bg-slate-100" title="설정">⚙</button></div>
      <ProcessNav current={CURRENT_PHASE}/>
      <div className="mx-auto max-w-[1100px] overflow-x-auto px-3"><nav className="flex gap-1">{TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} className={cx("flex items-center gap-1.5 whitespace-nowrap border-b-2 px-4 py-2.5 text-sm font-semibold transition",tab===t.id?"border-brand text-brand-hover":"border-transparent text-slate-500 hover:text-ink")}>{t.label}<span className="text-[11px] text-slate-400">{t.pid}</span></button>)}</nav></div>
    </header>
    <main className="mx-auto max-w-[1100px] px-5 py-7">
      <GatePanel phase={CURRENT_PHASE}/>
      <div className={tab==="affinity"?"":"hidden"}><AffinityPanel settings={settings} openSettings={openSettings} toast={toastFn}/></div>
      <div className={tab==="journey"?"":"hidden"}><JourneyPanel settings={settings} openSettings={openSettings} toast={toastFn}/></div>
      <div className={tab==="hmw"?"":"hidden"}><HmwPanel settings={settings} openSettings={openSettings} toast={toastFn}/></div>
      <div className={tab==="prd"?"":"hidden"}><PrdPanel settings={settings} openSettings={openSettings} toast={toastFn}/></div>
    </main>
    <StageNav tab={tab} setTab={setTab}/>
    {showSettings&&<SettingsModal settings={settings} onSave={(s)=>{setSettings({...s,backendChosen:true});setShowSettings(false);toastFn("ok","설정 저장됨");}} onClose={()=>setShowSettings(false)}/>}
    <ManualModal req={manualBridge.current()} queueCount={manualBridge.count()} onSubmit={(t)=>manualBridge.resolveCurrent(t)} onCancel={()=>manualBridge.rejectCurrent()}/>
    <ProgressOverlay state={embLoader} title="임베딩 모델 준비 중" emoji="🧮"/>
    <ProgressOverlay state={webllmLoader} title="브라우저 내장 AI 준비 중" emoji="🌐"/>
    <WorkspaceFab toast={toastFn}/>
    <Toast toast={toast}/>
  </div>;
}
window.addEventListener("error",(e)=>{const root=document.getElementById("root");if(root&&(!root.firstElementChild||root.dataset.errored)){if(root.dataset.errored)return;root.dataset.errored="1";root.innerHTML='<div style="padding:24px;font-family:Pretendard,system-ui,sans-serif;color:#b91c1c"><h2 style="font-weight:700;margin-bottom:8px">초기화 오류</h2><pre style="white-space:pre-wrap;color:#54576a">'+(e.message||e.error||"알 수 없는 오류")+'</pre></div>';}});
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
